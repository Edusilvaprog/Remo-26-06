<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#E52E87">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="description" content="Portal de agendamento exclusivo para mensalistas da Remoterapia.">
    <title>Agendamento · Remoterapia</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/croppie/2.6.5/croppie.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/croppie/2.6.5/croppie.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        window.onerror = function(msg, src, line, col, err) {
            document.body.innerHTML += '<div style="position:fixed;top:0;left:0;width:100%;background:red;color:white;z-index:9999;padding:10px;font-size:14px;font-family:sans-serif">Erro PC: ' + msg + ' (Linha ' + line + ')</div>';
        };
        if(window.tailwind) {
            tailwind.config = {
                theme: { extend: {
                colors: {
                    remopink:  { light:'#f472b6', DEFAULT:'#E52E87', dark:'#be185d' },
                    remoblue:  { light:'#38bdf8', DEFAULT:'#1D70B8', dark:'#1e3a8a' },
                    remogreen: { light:'#a3e635', DEFAULT:'#76C043', dark:'#4d7c0f'  }
                },
                boxShadow: { 'glow':'0 0 24px rgba(229,46,135,0.45)', 'float':'0 20px 40px -10px rgba(29,112,184,0.18)' },
                keyframes: {
                    'fade-up':   { '0%':{ opacity:'0', transform:'translateY(14px)' }, '100%':{ opacity:'1', transform:'translateY(0)' } },
                    'pop':       { '0%':{ transform:'scale(0.92)' }, '60%':{ transform:'scale(1.04)' }, '100%':{ transform:'scale(1)' } },
                    'pulse-red': { '0%,100%':{ boxShadow:'0 0 0 0 rgba(239,68,68,0.4)' }, '60%':{ boxShadow:'0 0 0 8px rgba(239,68,68,0)' } },
                    'slide-up':  { '0%':{ transform:'translateY(100%)' }, '100%':{ transform:'translateY(0)' } }
                },
                animation: {
                    'fade-up':'fade-up .3s ease both',
                    'pop':'pop .25s ease both',
                    'pulse-red':'pulse-red 2s infinite',
                    'slide-up':'slide-up .35s cubic-bezier(0.34,1.56,0.64,1) both'
                }
            }}
        }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap');
        *, *::before, *::after { box-sizing: border-box; }
        ::-webkit-scrollbar { display: none; }

        body {
            font-family: 'Nunito', system-ui, sans-serif;
            background: linear-gradient(150deg, #e0f2fe 0%, #bae6fd 45%, #fce7f3 100%);
            background-attachment: fixed;
            color: #1e293b;
            min-height: 100vh;
            -webkit-tap-highlight-color: transparent;
        }

        .glass-card {
            background: rgba(255,255,255,0.78);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1.5px solid rgba(255,255,255,0.88);
            border-radius: 1.25rem;
            padding: 1rem;
            box-shadow: 0 6px 24px -4px rgba(29,112,184,0.10);
        }
        .custom-input {
            width:100%; padding:.85rem 1rem;
            background:rgba(255,255,255,0.88); border:2px solid #bae6fd;
            border-radius:.9rem; font-weight:700; font-size:.9rem; color:#0f172a;
            outline:none; transition:border-color .2s, box-shadow .2s;
        }
        .custom-input:focus { border-color:#E52E87; box-shadow:0 0 0 4px rgba(229,46,135,.18); background:#fff; }
        .pin-input { letter-spacing:.6em; font-size:1.3rem; text-align:center; }

        /* Toast */
        .toast {
            position:fixed; top:max(env(safe-area-inset-top,0px) + 1rem, 1.2rem); left:50%;
            transform:translateX(-50%) translateY(-16px); opacity:0;
            width:max-content; max-width:min(90vw,26rem);
            background:rgba(10,18,36,.96); color:#f8fafc;
            border:1px solid rgba(255,255,255,.12); border-radius:9999px;
            padding:.6rem 1.1rem; box-shadow:0 12px 28px rgba(0,0,0,.28);
            z-index:99999; display:flex; align-items:center; gap:.5rem;
            font-weight:800; font-size:.8rem;
            transition:all .3s cubic-bezier(0.34,1.56,0.64,1); pointer-events:none;
        }
        .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

        /* Bottom Nav */
        .bottom-nav {
            position:fixed; bottom:0; left:50%; transform:translateX(-50%);
            width:100%; max-width:28rem;
            background:rgba(255,255,255,0.92); backdrop-filter:blur(24px);
            -webkit-backdrop-filter:blur(24px);
            border-top:1.5px solid rgba(255,255,255,0.9);
            box-shadow:0 -8px 30px rgba(29,112,184,0.12);
            padding-bottom:env(safe-area-inset-bottom, 0.5rem);
            z-index:900;
        }
        .nav-btn { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:.6rem .3rem .4rem; gap:2px; cursor:pointer; transition:all .2s; border:none; background:transparent; }
        .nav-btn .nav-icon { font-size:1.2rem; transition:transform .2s; }
        .nav-btn .nav-label { font-size:.55rem; font-weight:900; text-transform:uppercase; letter-spacing:.08em; }
        .nav-btn.active .nav-icon { transform:scale(1.15); }
        .nav-btn.active .nav-label { color:#E52E87; }
        .nav-btn:not(.active) .nav-label { color:#94a3b8; }

        /* Stars Rating */
        .star-btn { font-size:1.8rem; cursor:pointer; transition:transform .15s; border:none; background:transparent; padding:.1rem; }
        .star-btn:hover, .star-btn.active { transform:scale(1.2); }

        /* Photo Slots */
        .foto-slot { position:relative; aspect-ratio:1; cursor:pointer; }
        .foto-slot input[type=file] { position:absolute; inset:0; opacity:0; cursor:pointer; z-index:2; }
        .foto-slot .slot-inner {
            width:100%; height:100%;
            background:#f8fafc; border:2.5px dashed #cbd5e1;
            border-radius:1rem; display:flex; flex-direction:column;
            align-items:center; justify-content:center; transition:all .2s; overflow:hidden;
        }
        .foto-slot.filled .slot-inner { border-color:#76C043; border-style:solid; }
        .foto-slot img { width:100%; height:100%; object-fit:cover; }

        /* Calendar */
        .cal-day {
            aspect-ratio:1; display:flex; flex-direction:column; align-items:center;
            justify-content:center; border-radius:.75rem; font-size:.72rem; font-weight:900;
            cursor:pointer; transition:all .18s; position:relative;
        }
        .cal-day.available { background:rgba(118,192,67,.15); color:#4d7c0f; border:1.5px solid rgba(118,192,67,.4); }
        .cal-day.available:hover { background:rgba(118,192,67,.3); transform:scale(1.08); }
        .cal-day.booked { background:rgba(229,46,135,.12); color:#be185d; border:1.5px solid rgba(229,46,135,.3); }
        .cal-day.closed { background:rgba(148,163,184,.1); color:#cbd5e1; border:1.5px solid rgba(148,163,184,.15); cursor:default; }
        .cal-day.today { box-shadow:0 0 0 2.5px #E52E87; }
        .cal-day.past { opacity:.4; cursor:default; }
        .cal-day .dot { width:5px; height:5px; border-radius:9999px; position:absolute; bottom:3px; }

        /* Perfil Avatar */
        .avatar-wrap { position:relative; display:inline-block; }
        .avatar-wrap input[type=file] { position:absolute; inset:0; opacity:0; cursor:pointer; border-radius:9999px; z-index:2; }

        /* WA Button */
        .wa-btn {
            position:fixed; bottom:5.5rem; right:1rem;
            width:3rem; height:3rem; background:#25D366; border-radius:9999px;
            display:flex; align-items:center; justify-content:center;
            box-shadow:0 4px 18px rgba(37,211,102,.5); border:2.5px solid white;
            z-index:850; transition:transform .2s;
        }
        .wa-btn:hover { transform:translateY(-3px) scale(1.06); }
        .error-border { border-color: #ef4444 !important; }
        .cloud-sync-dot {
            display: inline-block; width: 8px; height: 8px; border-radius: 9999px; border: 1px solid rgba(255,255,255,0.55); vertical-align: middle; margin-left: 4px;
        }
        .cloud-sync-dot[data-status="ok"] { background: #4ade80; box-shadow: 0 0 6px rgba(74, 222, 128, 0.9); }
        .cloud-sync-dot[data-status="syncing"] { background: #fbbf24; animation: cloud-pulse 1s ease-in-out infinite; }
        .cloud-sync-dot[data-status="error"] { background: #f87171; box-shadow: 0 0 6px rgba(248, 113, 113, 0.8); }
        .cloud-sync-dot[data-status="offline"] { background: #94a3b8; }
        @keyframes cloud-pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.55; transform: scale(0.85); } }
    </style>
</head>
<body class="antialiased overflow-x-hidden">

<div id="toast" class="toast"><span id="t-icon">✅</span><span id="t-msg">Mensagem</span></div>
<div id="root" class="max-w-md mx-auto min-h-screen flex flex-col relative px-4 pt-5 pb-28"></div>

<script>
// ═══════════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════════
const SUPORTE_WA   = '5513991052169';
const DEFAULT_URL  = 'https://tgfatoxwhxazecpernyb.supabase.co';
const DEFAULT_KEY  = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRnZmF0b3h3aHhhemVjcGVybnliIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA0NzQ1MTksImV4cCI6MjA5NjA1MDUxOX0.mJvqXLGMLc75zrdRsZ1zhsi6XvBx6IIUWDecdxYT7Qk';
const SYNC_KEY     = 'plorix_sync_config';
const SESSION_KEY  = 'plorix_client_session';
const PROFILE_KEY  = 'plorix_client_profile';
const NOTIF_KEY    = 'plorix_notifications';
const LOCAL_DB_KEY = 'plorix_gestao_db'; // mesmo key do App Gestao para compatibilidade

const Sync = {
    cfg: () => { try { const r=localStorage.getItem(SYNC_KEY); if(r) return JSON.parse(r); } catch(e){} return {url:DEFAULT_URL,anonKey:DEFAULT_KEY,enabled:true}; },
    hdr: () => { const c=Sync.cfg(); return { apikey:c.anonKey, Authorization:'Bearer '+c.anonKey, 'Content-Type':'application/json' }; }
};

// ═══════════════════════════════════════════════
// LOCAL DB — salva imediatamente, igual ao App Gestao
// ═══════════════════════════════════════════════
const DB = {
    // Le o banco local (shared com App Gestao)
    load() {
        try {
            const raw = localStorage.getItem(LOCAL_DB_KEY);
            if(raw) return JSON.parse(raw);
        } catch(e){}
        return {};
    },
    // Salva APENAS os campos que o client gerencia, sem sobrescrever o resto
    save() {
        try {
            const current = DB.load();
            current.assinantes  = State.assinantes;
            current.agendamentos = State.agendamentos;
            current.caiaques    = State.caiaques.length ? State.caiaques : (current.caiaques || []);
            localStorage.setItem(LOCAL_DB_KEY, JSON.stringify(current));
        } catch(e){ console.warn('DB.save error:', e); }
    },
    // Carrega estado inicial do banco local para o State
    hydrate() {
        const db = DB.load();
        if(Array.isArray(db.caiaques)   && db.caiaques.length)   State.caiaques    = db.caiaques;
        if(Array.isArray(db.assinantes) && db.assinantes.length) {
            State.assinantes  = db.assinantes;
            if (State.assinante) {
                const u = State.assinantes.find(x => x.id === State.assinante.id);
                if (u && u.bloqueado) {
                    State.assinante = null;
                    localStorage.removeItem(SESSION_KEY);
                    State.currentPage = 'login';
                } else if (u) {
                    State.assinante = { ...u, ativo: true };
                }
            }
        }
        if(Array.isArray(db.agendamentos))                         State.agendamentos = db.agendamentos;
    }
};

// ═══════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════
const State = {
    assinante:    null,
    caiaques:     [],
    agendamentos: [],
    avaliacoes:   [],
    notifications:[],
    currentPage:  'login',
    calMonth:     new Date(),
    bookingForm:  { data:'', horario:'', caiaqueId:'' },
    fotosPend:    null,
    ratingForm:   { bookingId:null, stars:0, comment:'' },
    profileData:  { avatar:null, plano:'Mensalista', vencimento:'' },
    diasFechados: [],
    assinantes:   [],
    adminMode:    false,
    _tutorialStep: 0,
    adminClientFilter: 'all', // 'all', 'ativos', 'vencidos'
    cloudStatus: 'ok' // 'ok', 'syncing', 'error', 'offline'
};

// ═══════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════
const U = {
    toast(msg, type='success') {
        const el=document.getElementById('toast'), icons={success:'✅',error:'❌',warning:'⚠️',info:'ℹ️'};
        document.getElementById('t-icon').innerText = icons[type]||'✅';
        document.getElementById('t-msg').innerText  = msg;
        el.classList.add('show'); clearTimeout(U._tt);
        U._tt = setTimeout(()=>el.classList.remove('show'), 3400);
    },
    // [XSS] Funcao de sanitizacao: escapa caracteres HTML perigosos
    // antes de renderizar qualquer dado externo via innerHTML
    sanitize(str) {
        if (str === null || str === undefined) return '';
        return String(str)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#039;');
    },
    async hash(plain) {
        if(window.crypto&&crypto.subtle){
            try { const b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(plain)); return Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,'0')).join(''); } catch(e){}
        }
        let hash = 0;
        for (let i = 0; i < plain.length; i++) {
            const chr = plain.charCodeAt(i);
            hash = ((hash << 5) - hash) + chr;
            hash |= 0;
        }
        return hash.toString(16);
    },
    fmtDate(ds) {
        const d=new Date(ds+'T12:00:00');
        return d.toLocaleDateString('pt-BR',{day:'numeric',month:'short',weekday:'short'}).toUpperCase();
    },
    fmtDateLong(ds) {
        const d=new Date(ds+'T12:00:00');
        return d.toLocaleDateString('pt-BR',{day:'numeric',month:'long',year:'numeric'});
    },
    weekRange(d) {
        const dt=new Date(d), day=dt.getDay(), diff=dt.getDate()-day+(day===0?-6:1);
        const s=new Date(dt.setDate(diff)); s.setHours(0,0,0,0);
        const e=new Date(s); e.setDate(e.getDate()+6); e.setHours(23,59,59,999);
        return {start:s,end:e};
    },
    waLink(msg) { return `https://wa.me/${SUPORTE_WA}?text=${encodeURIComponent(msg)}`; },
    readFile(file) {
        return new Promise((res,rej)=>{ const r=new FileReader(); r.onload=e=>res(e.target.result); r.onerror=rej; r.readAsDataURL(file); });
    },
    monthName(d) { return d.toLocaleDateString('pt-BR',{month:'long',year:'numeric'}).toUpperCase(); },
    daysInMonth(y,m) { return new Date(y,m+1,0).getDate(); },
    todayStr() { return new Date().toISOString().split('T')[0]; },
    fmtPhone(t) {
        if(!t) return '';
        const s = t.replace(/\D/g, '');
        if(s.length === 11) return `(${s.substring(0,2)}) ${s.substring(2,7)}-${s.substring(7)}`;
        if(s.length === 10) return `(${s.substring(0,2)}) ${s.substring(2,6)}-${s.substring(6)}`;
        return t;
    },
    maskPhone(input) {
        let v = input.value.replace(/\D/g, '');
        if (v.length > 11) v = v.substring(0, 11);
        if (v.length > 2) v = `(${v.substring(0, 2)}) ${v.substring(2)}`;
        if (v.length > 10) v = `${v.substring(0, 10)}-${v.substring(10)}`;
        else if (v.length > 9) v = `${v.substring(0, 9)}-${v.substring(9)}`;
        input.value = v;
    },
    // Calcula a proxima data de vencimento a partir do dia escolhido, sem bug de fuso/overflow
    calcVencimento(dia) {
        const hoje = new Date();
        const ano  = hoje.getFullYear();
        const mes  = hoje.getMonth(); // 0-indexed
        // Tenta criar a data no mes atual
        let d = new Date(ano, mes, dia, 12, 0, 0);
        // Se ja passou (ou dia invalido no mes, ex: dia 31 em abril), vai para o proximo mes
        if(d <= hoje) d = new Date(ano, mes + 1, dia, 12, 0, 0);
        // Formata como YYYY-MM-DD sem depender de UTC
        const y = d.getFullYear();
        const m = String(d.getMonth()+1).padStart(2,'0');
        const dd = String(d.getDate()).padStart(2,'0');
        return `${y}-${m}-${dd}`;
    }
};

// ═══════════════════════════════════════════════
// PUSH NOTIFICATIONS
// ═══════════════════════════════════════════════
const Notif = {
    async requestPermission() {
        if(!('Notification' in window)) return false;
        if(Notification.permission==='granted') return true;
        const perm = await Notification.requestPermission();
        return perm==='granted';
    },
    async send(title, body, icon='./logo.png') {
        if(Notification.permission!=='granted') return;
        try { new Notification(title, { body, icon, badge:icon, tag:'remoterapia-agend' }); } catch(e){}
    },
    save(n) {
        const list = Notif.load();
        list.unshift({ id:Date.now(), ...n, read:false, time:new Date().toISOString() });
        localStorage.setItem(NOTIF_KEY, JSON.stringify(list.slice(0,30)));
    },
    load() { try { return JSON.parse(localStorage.getItem(NOTIF_KEY)||'[]'); } catch(e){ return []; } },
    unreadCount() { return Notif.load().filter(n=>!n.read).length; },
    markAllRead() {
        const list = Notif.load().map(n=>({...n, read:true}));
        localStorage.setItem(NOTIF_KEY, JSON.stringify(list));
    },
    // Simula recebimento de notificação do admin (em produção viria do Supabase Realtime)
    simulateAdminAction(type, bookingData) {
        const msgs = {
            confirmado: { title:'✅ Reserva Confirmada!', body:`Sua reserva para ${U.fmtDate(bookingData.data_reserva)} às ${bookingData.horario_reserva.substring(0,5)} foi confirmada.` },
            cancelado:  { title:'❌ Reserva Recusada', body:`Sua reserva para ${U.fmtDate(bookingData.data_reserva)} foi recusada pelo administrador.` }
        };
        const m = msgs[type];
        if(m) { Notif.send(m.title, m.body); Notif.save({title:m.title, body:m.body, type}); }
    }
};

// ═══════════════════════════════════════════════
// API
// ═══════════════════════════════════════════════
const API = {
    // Carrega dados da nuvem — so usado no boot e em refresh manual
    async loadData() {
        State.cloudStatus = 'syncing'; A.render();
        const c=Sync.cfg(), base=c.url.replace(/\/$/,''), h=Sync.hdr();
        try {
            const rG = await fetch(base+'/rest/v1/plorix_sync?id=eq.2&select=payload',{headers:h});
            if(rG.ok){ 
                const rows=await rG.json(); const p=rows[0]?.payload; 
                if(p && typeof p==='object' && Object.keys(p).length>0) {
                    if(Array.isArray(p.caiaques)    && p.caiaques.length)    State.caiaques    = p.caiaques;
                    if(Array.isArray(p.assinantes)  && p.assinantes.length) {
                        State.assinantes  = p.assinantes;
                        if (State.assinante) {
                            const u = State.assinantes.find(x => x.id === State.assinante.id);
                            if (u && u.bloqueado) {
                                State.assinante = null;
                                localStorage.removeItem(SESSION_KEY);
                                State.currentPage = 'login';
                                U.toast('Sua conta foi suspensa.','error');
                            } else if (u) {
                                State.assinante = { ...u, ativo: true };
                                localStorage.setItem(SESSION_KEY, JSON.stringify(State.assinante));
                            }
                        }
                    }
                    if(Array.isArray(p.agendamentos))                         State.agendamentos = p.agendamentos;
                    State.cloudPayload = p;
                    DB.save();
                    if (State.currentPage !== 'login') A.render();
                }
                State.cloudStatus = 'ok';
            } else {
                State.cloudStatus = 'error';
            }
        } catch(e){ 
            State.cloudStatus = 'offline';
        }
        if(!State.caiaques.length || !State.assinantes.length) DB.hydrate();
        if (State.cloudPayload && Array.isArray(State.cloudPayload.diasFechados)) {
            State.diasFechados = State.cloudPayload.diasFechados;
        } else {
            State.diasFechados = [];
        }
    },

    save() {
        DB.save();
    },

    async sendTicket(type, data) {
        State.cloudStatus = 'syncing'; A.render();
        const c=Sync.cfg(), base=c.url.replace(/\/$/,''), h=Sync.hdr();
        const ticketId = 1000 + Math.floor(Math.random() * 900000);
        const row = { id: ticketId, payload: { type, data, assinanteId: State.assinante?.id }, updated_at: new Date().toISOString() };
        try {
            await fetch(base+'/rest/v1/plorix_sync?on_conflict=id', {
                method:'POST', headers:{...h, Prefer:'return=minimal,resolution=merge-duplicates'},
                body:JSON.stringify([row])
            });
            State.cloudStatus = 'ok';
        } catch(e) {
            State.cloudStatus = 'offline';
        }
        A.render();
    },

    async auth(tel, pin) {
        const phone=tel.replace(/\D/g,'');
        
        try {
            const h = await U.hash(pin);
            const user = State.assinantes.find(a => String(a.telefone) === phone && String(a.senhaHash) === String(h) && a.bloqueado !== true);
            if (user) return { ...user, ativo: true };
        } catch(e) {}
        return null;
    },
    async createBooking(b) {
        State.agendamentos.push(b);
        DB.save();
        await API.sendTicket('agendamento_request', b);
        return true;
    },
    async cancelBooking(id) {
        const ag = State.agendamentos.find(a=>a.id===id);
        if(ag) { 
            ag.status = 'cancelado'; 
            DB.save(); 
            await API.sendTicket('agendamento_request', ag);
        }
        return true;
    }
};

// ═══════════════════════════════════════════════
// ACTIONS
// ═══════════════════════════════════════════════
const A = {
    async login() {
        const telEl = document.getElementById('l-tel');
        const pinEl = document.getElementById('l-pin');
        const tel = telEl?.value.trim() || '';
        const pin = pinEl?.value.trim() || '';
        
        telEl.classList.remove('error-border');
        pinEl.classList.remove('error-border');
        
        if(!tel){ telEl.classList.add('error-border'); U.toast('Informe o telefone.','warning'); return; }
        if(pin.length!==6){ pinEl.classList.add('error-border'); U.toast('PIN de 6 dígitos.','warning'); return; }
        
        const btn=document.getElementById('btn-login');
        if(btn){ btn.innerText='Entrando...'; btn.disabled=true; }
        
        const user=await API.auth(tel,pin);
        if(user){
            State.assinante=user;
            localStorage.setItem(SESSION_KEY,JSON.stringify(user));
            const saved=localStorage.getItem(PROFILE_KEY);
            if(saved) try{ State.profileData={...State.profileData,...JSON.parse(saved)}; }catch(e){}
            await Notif.requestPermission();
            U.toast(`Bem-vinda(o), ${user.nome.split(' ')[0]}! 🌊`);
            
            if(user.precisa_trocar_senha) {
                await A.goTo('forcePasswordChange');
            } else {
                await A.goTo('home');
            }
        } else {
            U.toast('Telefone ou senha incorretos.','error');
            if(btn){ btn.innerText='Entrar'; btn.disabled=false; }
        }
    },
    logout() {
        if(!confirm('Deseja sair?')) return;
        State.assinante=null; State.caiaques=[]; State.agendamentos=[]; State.adminMode=false;
        localStorage.removeItem(SESSION_KEY);
        A.goTo('login');
    },
    async goTo(page) {
        if (State.fotosPend && (page === 'agendar' || page === 'calendario')) {
            U.toast('Resolva a vistoria pendente para poder agendar!','error');
            return;
        }
        State.currentPage=page;
        const pullPages = ['home','calendario','perfil','pagamento'];
        if(pullPages.includes(page)) {
            API.loadData().then(()=>A.render()).catch(()=>{});
        }
        A.render();
        window.scrollTo({top:0,behavior:'smooth'});
    },
    weekCount() {
        if(!State.assinante) return 0;
        const {start,end}=U.weekRange(new Date());
        return State.agendamentos.filter(a=>{
            if(a.assinante_id!==State.assinante.id||a.status==='cancelado'||a.status==='recusado'||a.criado_por_admin===true) return false;
            const d=new Date(a.data_reserva+'T12:00:00');
            return d>=start&&d<=end;
        }).length;
    },
    async saveNewPassword() {
        const pin = document.getElementById('new-pin')?.value.trim();
        if(!pin || pin.length !== 6) { U.toast('O PIN deve ter 6 dígitos', 'warning'); return; }
        
        const newHash = await U.hash(pin);
        State.assinante.senhaHash = newHash;
        State.assinante.precisa_trocar_senha = false;
        
        const c = State.assinantes.find(x => x.id === State.assinante.id);
        if(c) {
            c.senhaHash = newHash;
            c.precisa_trocar_senha = false;
            delete c.senha_provisoria;
        }
        
        localStorage.setItem(SESSION_KEY, JSON.stringify(State.assinante));
        DB.save();
        
        await API.sendTicket('password_change', { newHash });
        
        U.toast('Senha cadastrada com sucesso!');
        if(State.assinante.isAdmin) {
            A.goTo('roleSelect');
        } else {
            A.goTo('home');
        }
    },
    openChangePassword() {
        document.body.insertAdjacentHTML('beforeend',`
            <div id="modal-change-password" style="position:fixed;inset:0;background:rgba(10,18,36,.82);backdrop-filter:blur(6px);z-index:9990;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:1rem;">
                <div class="animate-slide-up" style="background:white;border-radius:1.5rem;padding:1.5rem;width:100%;max-width:26rem;">
                    <h2 style="font-weight:900;text-transform:uppercase;color:#0f172a;margin-bottom:1rem;text-align:center">Alterar Senha</h2>
                    <div class="space-y-3">
                        <div>
                            <p class="text-[9px] font-bold text-slate-400 ml-1 mb-0.5 uppercase tracking-widest">Senha Atual</p>
                            <input type="password" id="cp-old" class="custom-input !py-2 !text-sm" placeholder="PIN atual (6 dígitos)" maxlength="6">
                        </div>
                        <div>
                            <p class="text-[9px] font-bold text-slate-400 ml-1 mb-0.5 uppercase tracking-widest">Nova Senha</p>
                            <input type="password" id="cp-new" class="custom-input !py-2 !text-sm" placeholder="Novo PIN (6 dígitos)" maxlength="6">
                        </div>
                        <div style="display:flex;gap:.5rem;margin-top:1rem">
                            <button onclick="document.getElementById('modal-change-password').remove()" class="flex-1 py-3 bg-slate-100 text-slate-600 rounded-xl font-black uppercase text-xs">Cancelar</button>
                            <button id="btn-change-pwd" onclick="A.saveChangedPassword()" class="flex-1 py-3 bg-remopink text-white rounded-xl font-black uppercase text-xs">Salvar</button>
                        </div>
                    </div>
                </div>
            </div>`);
    },
    async saveChangedPassword() {
        const oldEl = document.getElementById('cp-old');
        const newEl = document.getElementById('cp-new');
        const oldPin = oldEl?.value.trim();
        const newPin = newEl?.value.trim();
        
        oldEl?.classList.remove('error-border');
        newEl?.classList.remove('error-border');
        
        // [SEGURANCA] Comparamos hashes SHA-256, nunca texto plano
        const oldHash = await U.hash(oldPin);
        const currentHash = State.assinante.senhaHash;
        
        let hasErr = false;
        if(oldHash !== currentHash) { oldEl?.classList.add('error-border'); hasErr=true; U.toast('Senha atual incorreta.', 'error'); }
        if(!newPin || newPin.length !== 6) { newEl?.classList.add('error-border'); hasErr=true; U.toast('Nova senha deve ter 6 digitos.', 'warning'); }
        if(hasErr) return;
        
        const btn = document.getElementById('btn-change-pwd');
        if(btn) { btn.innerText = 'Salvando...'; btn.disabled = true; }
        
        // [SEGURANCA] Salva apenas o hash, remove campo legado de texto plano
        const newHash = await U.hash(newPin);
        State.assinante.senhaHash = newHash;
        delete State.assinante.senha;
        const c = State.assinantes.find(x => x.id === State.assinante.id);
        if(c) { c.senhaHash = newHash; delete c.senha; }
        
        localStorage.setItem(SESSION_KEY, JSON.stringify(State.assinante));
        API.save();
        await API.sendTicket('password_change', { newHash });
        
        document.getElementById('modal-change-password')?.remove();
        U.toast('Senha atualizada com sucesso!');
    },
    pendingPhotos() {
        if(!State.assinante) return [];
        return State.agendamentos.filter(a=>a.assinante_id===State.assinante.id&&a.status==='concluido'&&!a.fotos_enviadas);
    },
    pendingRatings() {
        if(!State.assinante) return [];
        return State.agendamentos.filter(a=>a.assinante_id===State.assinante.id&&a.status==='concluido'&&a.fotos_enviadas&&!a.avaliado);
    },
    kayakAvail(id, ds, ts) {
        const c=State.caiaques.find(x=>x.id===id);
        if(!c||c.status==='inoperante') return false;
        const rt=new Date(`${ds}T${ts}:00`);
        return !State.agendamentos.some(a=>{
            if(a.caiaque_id!==id||a.status==='cancelado'||a.status==='concluido') return false;
            return Math.abs(rt-new Date(`${a.data_reserva}T${a.horario_reserva}`))/60000<90;
        });
    },
    selDate(v){ State.bookingForm.data=v; State.bookingForm.horario=''; State.bookingForm.caiaqueId=''; A.render(); },
    selTime(v){ State.bookingForm.horario=v; State.bookingForm.caiaqueId=''; A.render(); },
    selKayak(v){ State.bookingForm.caiaqueId=v; A.render(); },
    async submitBooking() {
        const {data,horario,caiaqueId}=State.bookingForm;
        if(!data||!horario||!caiaqueId){ U.toast('Selecione data, horário e embarcação.','warning'); return; }
        if(!document.getElementById('termos-uso')?.checked){ U.toast('Aceite os termos.','warning'); return; }
        if(A.weekCount()>=2){ U.toast('Limite de 2 reservas semanais atingido.','error'); return; }
        const btn=document.getElementById('btn-sub');
        if(btn){ btn.innerText='Enviando...'; btn.disabled=true; }
        const nb={
            id:crypto.randomUUID?crypto.randomUUID():String(Date.now()),
            assinante_id:State.assinante.id, assinante_nome:State.assinante.nome,
            caiaque_id:caiaqueId, data_reserva:data, horario_reserva:horario,
            status:'pendente', fotos_enviadas:false, avaliado:false, duracao_horas:0,
            created_at:new Date().toISOString()
        };
        const ok=await API.createBooking(nb);
        if(ok||State.assinante.id==='test-user-id'){
            State.bookingForm={data:'',horario:'',caiaqueId:''};
            Notif.save({title:'🛶 Agendamento Enviado!',body:`Reserva para ${U.fmtDate(data)} às ${horario.substring(0,5)} aguarda confirmação.`,type:'pendente'});
            U.toast('Solicitação enviada! Aguarde confirmação. 🛶');
            await A.goTo('home');
        } else {
            U.toast('Erro ao enviar. Tente novamente.','error');
            if(btn){ btn.innerText='Confirmar Agendamento'; btn.disabled=false; }
        }
    },
    async cancelReservation(id) {
        const ag=State.agendamentos.find(x=>x.id===id); if(!ag) return;
        const isGuardaria = State.assinante?.tipo_plano === 'guardaria';
        const multa = isGuardaria ? 'R$ 50,00' : 'R$ 200,00';
        
        document.body.insertAdjacentHTML('beforeend', `
            <div id="modal-cancel" style="position:fixed;inset:0;background:rgba(10,18,36,.82);backdrop-filter:blur(6px);z-index:9990;display:flex;flex-direction:column;justify-content:center;padding:1.5rem;">
                <div class="animate-slide-up" style="background:white;border-radius:1.5rem;padding:1.5rem;">
                    <h2 style="font-weight:900;text-transform:uppercase;color:#ef4444;margin-bottom:0.5rem;font-size:1.1rem">Cancelar Reserva?</h2>
                    <p style="font-size:0.8rem;color:#64748b;font-weight:700;margin-bottom:1rem">Tem certeza que deseja cancelar sua reserva para o dia ${U.fmtDate(ag.data_reserva)} às ${ag.horario_reserva.substring(0,5)}?</p>
                    <div style="background:#fff1f2; border:1px solid #fda4af; padding:1rem; border-radius:1rem; margin-bottom:1.5rem">
                        <strong style="color:#e11d48; font-size:0.85rem; display:block; margin-bottom:0.25rem">Atenção!</strong>
                        <p style="color:#be123c; font-size:0.75rem; line-height:1.4">Cancelamentos fora do prazo prejudicam a logística da equipe. Uma multa de <strong>${multa}</strong> poderá ser cobrada na sua próxima mensalidade em caso de infração da regra.</p>
                    </div>
                    <div style="display:flex;gap:0.5rem">
                        <button onclick="document.getElementById('modal-cancel').remove()" class="flex-1 py-3 bg-slate-100 text-slate-600 font-black rounded-xl uppercase tracking-widest text-xs active:scale-95 transition-all">Voltar</button>
                        <button onclick="document.getElementById('modal-cancel').remove(); A.confirmCancel('${id}')" class="flex-1 py-3 bg-red-500 text-white font-black rounded-xl uppercase tracking-widest text-xs active:scale-95 shadow-glow transition-all">Sim, Cancelar</button>
                    </div>
                </div>
            </div>
        `);
    },
    async confirmCancel(id) {
        const ag=State.agendamentos.find(x=>x.id===id); if(!ag) return;
        const ok=await API.cancelBooking(id);
        if(ok||State.assinante.id==='test-user-id'){ ag.status='cancelado'; U.toast('Reserva cancelada.'); A.render(); }
        else U.toast('Erro ao cancelar.','error');
    },
    // 📸 Fotos 📸
    openPhotoModal(bookingId) {
        State.fotosPend={bookingId,slots:[null,null]};
        A.renderPhotoModal();
    },
    renderPhotoModal() {
        document.getElementById('modal-fotos')?.remove();
        const {slots,bookingId}=State.fotosPend;
        const filled=slots.filter(Boolean).length;
        const labels=['Frente','Armazenado no rack'];
        const slotsHtml=slots.map((s,i)=>`
            <div class="foto-slot ${s?'filled':''}" id="fs-${i}">
                <input type="file" accept="image/*" capture="environment" onchange="A.pickPhoto(${i},this)">
                <div class="slot-inner">
                    ${s?`<img src="${s}" alt="">`:`<span style="font-size:1.5rem">📷</span><span style="font-size:.62rem;font-weight:900;text-transform:uppercase;color:#94a3b8;margin-top:3px">${labels[i]}</span>`}
                </div>
            </div>`).join('');
        document.body.insertAdjacentHTML('beforeend',`
            <div id="modal-fotos" style="position:fixed;inset:0;background:rgba(10,18,36,.82);backdrop-filter:blur(6px);z-index:9990;display:flex;flex-direction:column;justify-content:flex-end;padding:1rem;">
                <div class="animate-slide-up" style="background:white;border-radius:1.5rem;padding:1.5rem;max-width:26rem;width:100%;margin:0 auto;box-shadow:0 24px 64px rgba(0,0,0,.3)">
                    <div style="display:flex;align-items:center;gap:.75rem;margin-bottom:.5rem">
                        <span style="font-size:1.5rem">📷</span>
                        <div><p style="font-size:.68rem;font-weight:900;text-transform:uppercase;letter-spacing:.12em;color:#64748b;margin:0">Vistoria Pós-Remada</p><p style="font-weight:900;font-size:1rem;color:#0f172a;margin:0">Envio de Fotos</p></div>
                    </div>
                    <p style="font-size:.72rem;color:#64748b;font-weight:700;margin-bottom:1rem;line-height:1.5">Tire 2 fotos do caiaque: frente e armazenado no rack. Isso libera novas reservas.</p>
                    <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:.6rem;margin-bottom:1rem;">${slotsHtml}</div>
                    <div style="background:#f0fdf4;border:1.5px solid #bbf7d0;border-radius:.8rem;padding:.55rem .8rem;margin-bottom:1rem;display:flex;align-items:center;gap:.5rem">
                        <span>${filled>=2?'✔️':'⏳'}</span>
                        <span style="font-size:.72rem;font-weight:800;color:#166534;text-transform:uppercase;letter-spacing:.06em">${filled}/2 fotos selecionadas</span>
                    </div>
                    <button onclick="A.submitPhotos()" ${filled>=2?'':'disabled'}
                            style="width:100%;padding:.9rem;background:${filled>=2?'linear-gradient(135deg,#1D70B8,#1e3a8a)':'#e2e8f0'};color:${filled>=2?'white':'#94a3b8'};border:none;border-radius:.9rem;font-weight:900;font-size:.78rem;text-transform:uppercase;letter-spacing:.1em;cursor:${filled>=2?'pointer':'not-allowed'};margin-bottom:.5rem;transition:all .2s">
                        ${filled>=2?'Enviar Fotos e Liberar Acesso':'Selecione as 2 Fotos'}
                    </button>
                    <button onclick="A.skipPhotos()" style="width:100%;padding:.8rem;background:#fff1f2;color:#e11d48;border-radius:.75rem;font-weight:900;text-transform:uppercase;font-size:.7rem;letter-spacing:.05em;border:1px solid #fda4af;margin-bottom:.5rem">Pular Vistoria (Assumo o Risco)</button>
                    <button onclick="document.getElementById('modal-fotos').remove()" style="width:100%;padding:.6rem;background:transparent;color:#94a3b8;border:none;font-weight:800;font-size:.72rem;text-transform:uppercase;cursor:pointer">Cancelar</button>
                </div>
            </div>`);
    },
    async pickPhoto(i, inp) {
        if(!inp.files?.[0]) return;
        try { State.fotosPend.slots[i]=await U.readFile(inp.files[0]); A.renderPhotoModal(); }
        catch(e){ U.toast('Erro ao carregar foto.','error'); }
    },
    submitPhotos() {
        const {bookingId,slots}=State.fotosPend;
        if(slots.filter(Boolean).length<2){ U.toast('Envie as 2 fotos.','warning'); return; }
        const ag=State.agendamentos.find(a=>a.id===bookingId);
        if(ag){
            ag.fotos_enviadas=true;
            DB.save();
            API.sendTicket('agendamento_request', ag);
        }
        
        if (slots[1]) {
            const caiName = State.caiaques.find(c=>String(c.id)===String(ag?.caiaque_id))?.nome || 'Equipamento';
            const todayDate = U.fmtDate(U.todayStr());
            const fPayload = {
                id: Date.now(),
                data: todayDate,
                autor: State.assinante.nome,
                tipo: 'Segurança',
                img: slots[1],
                desc: 'Foto de devolução do ' + caiName
            };
            API.sendTicket('nova_foto', fPayload);
        }

        State.fotosPend = null;
        Notif.save({title:'📸 Fotos Enviadas!',body:'Vistoria concluída. Você já pode fazer novas reservas.',type:'success'});
        U.toast('Fotos enviadas! Reservas liberadas. ✔️');
        document.getElementById('modal-fotos')?.remove();
        A.render();
    },
    skipPhotos() {
        if(!confirm('ATENÇÃO: Ao pular a vistoria fotográfica, você assume integralmente a responsabilidade financeira caso a equipe encontre avarias no caiaque antes do próximo embarque. Deseja assumir o risco?')) return;
        const {bookingId}=State.fotosPend;
        const ag=State.agendamentos.find(a=>a.id===bookingId);
        if(ag){
            ag.fotos_enviadas=true;
            ag.vistoria_pulada=true;
            DB.save();
            API.sendTicket('agendamento_request', ag);
        }
        State.fotosPend = null;
        Notif.save({title:'⚠️ Risco Assumido',body:'Vistoria pulada. Reservas liberadas.',type:'warning'});
        U.toast('Vistoria pulada. Reservas liberadas.');
        document.getElementById('modal-fotos')?.remove();
        A.render();
    },
    // ⭐ Avaliação ⭐
    async rateBooking(id, nota) {
        const ag=State.agendamentos.find(x=>x.id===id); if(!ag) return;
        ag.avaliado=true; ag.nota=nota; ag.comentario = '';
        DB.save();
        API.sendTicket('agendamento_request', ag);
        U.toast('Avaliação enviada com sucesso! Obrigado.', 'success');
        A.render();
    },
    // ── Calendário ──
    prevMonth() { State.calMonth=new Date(State.calMonth.getFullYear(),State.calMonth.getMonth()-1,1); A.render(); },
    nextMonth() { State.calMonth=new Date(State.calMonth.getFullYear(),State.calMonth.getMonth()+1,1); A.render(); },
    // ── Perfil ──
    async pickAvatar(inp) {
        if(!inp.files?.[0]) return;
        try {
            const b=await U.readFile(inp.files[0]);
            const div = document.createElement('div');
            div.id = 'crop-modal';
            div.className = 'fixed inset-0 bg-black/95 z-[9999] flex flex-col p-4 animate-fade-in';
            div.innerHTML = `
                <div class="flex justify-between items-center mb-6 pt-4">
                    <button class="text-white bg-white/20 px-4 py-2 rounded-xl active:scale-95 transition-transform text-sm font-bold uppercase tracking-wider" onclick="this.closest('#crop-modal').remove()">Cancelar</button>
                    <button id="crop-btn" class="text-white bg-remopink px-6 py-2 rounded-xl active:scale-95 transition-transform text-sm font-bold uppercase tracking-wider shadow-lg">Salvar</button>
                </div>
                <div class="flex-1 w-full relative flex items-center justify-center">
                    <div id="croppie-container" class="w-full max-h-[70vh]"></div>
                </div>
            `;
            document.body.appendChild(div);

            const el = document.getElementById('croppie-container');
            const croppie = new Croppie(el, {
                viewport: { width: 200, height: 200, type: 'circle' },
                boundary: { width: '100%', height: 400 },
                showZoomer: true,
                enableOrientation: true
            });

            croppie.bind({ url: b });

            document.getElementById('crop-btn').onclick = () => {
                const btn = document.getElementById('crop-btn');
                btn.innerHTML = 'Salvando...';
                btn.disabled = true;
                croppie.result({ type: 'base64', size: 'viewport', format: 'png', circle: false }).then(cropped => {
                    State.profileData.avatar = cropped;
                    localStorage.setItem(PROFILE_KEY, JSON.stringify(State.profileData));
                    A.render();
                    U.toast('Foto de perfil atualizada!');
                    div.remove();
                });
            };
        } catch(e){ U.toast('Erro ao carregar imagem.','error'); }
        inp.value = '';
    },
    // ── Notificações ──
    clearNotifications() {
        localStorage.setItem(NOTIF_KEY, '[]');
        document.getElementById('modal-notif')?.remove();
        U.toast('Notificações limpas! 🧹');
        A.render();
    },
    openNotifPanel() {
        document.getElementById('modal-notif')?.remove();
        const list=Notif.load();
        Notif.markAllRead();
        const notifHtml=list.length===0?`<p style="text-align:center;color:#94a3b8;font-weight:700;font-size:.8rem;padding:2rem 0">Nenhuma notificação ainda.</p>`:
            list.map(n=>`
                <div style="display:flex;gap:.75rem;align-items:flex-start;padding:.85rem;border-radius:.9rem;background:${n.read?'#f8fafc':'#fdf4ff'};border:1.5px solid ${n.read?'#e2e8f0':'#f5d0fe'};margin-bottom:.5rem">
                    <span style="font-size:1.2rem;flex-shrink:0">${n.type==='confirmado'?'✅':n.type==='cancelado'?'❌':n.type==='success'?'📸':'🛶'}</span>
                    <div>
                        <p style="font-weight:900;font-size:.78rem;color:#0f172a;margin:0 0 .2rem">${n.title}</p>
                        <p style="font-size:.72rem;color:#64748b;font-weight:700;margin:0">${n.body}</p>
                        <p style="font-size:.62rem;color:#94a3b8;font-weight:700;margin:.3rem 0 0">${new Date(n.time).toLocaleString('pt-BR')}</p>
                    </div>
                </div>`).join('');
        document.body.insertAdjacentHTML('beforeend',`
            <div id="modal-notif" style="position:fixed;inset:0;background:rgba(10,18,36,.82);backdrop-filter:blur(6px);z-index:9990;display:flex;flex-direction:column;justify-content:flex-end;padding:1rem;">
                <div class="animate-slide-up" style="background:white;border-radius:1.5rem;padding:1.5rem;max-width:26rem;width:100%;margin:0 auto;box-shadow:0 24px 64px rgba(0,0,0,.3);max-height:80vh;overflow-y:auto">
                    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem">
                        <div><p style="font-size:.68rem;font-weight:900;text-transform:uppercase;letter-spacing:.12em;color:#64748b;margin:0">Central de Avisos</p><p style="font-weight:900;font-size:1rem;color:#0f172a;margin:0">Notificações</p></div>
                        <div style="display:flex;gap:.5rem;align-items:center">

    async cadastrarCliente() {
        const els = ['c-nome', 'c-tel', 'c-pin', 'c-venc'].map(id => document.getElementById(id));
        els.forEach(el => el && el.classList.remove('error-border'));

        const nome = els[0]?.value.trim();
        const tel = els[1]?.value.replace(/\D/g,'');
        const pin = els[2]?.value.trim();
        const venc = parseInt(els[3]?.value);
        const tipo = document.getElementById('c-tipo')?.value;
        const equip = document.getElementById('c-equip')?.value.trim();
        
        let hasError = false;
        if(!nome) { els[0]?.classList.add('error-border'); hasError = true; }
        if(!tel) { els[1]?.classList.add('error-border'); hasError = true; }
        if(!pin || pin.length !== 6) { els[2]?.classList.add('error-border'); hasError = true; }
        if(!venc || venc < 1 || venc > 31) { els[3]?.classList.add('error-border'); hasError = true; }
        
        if(hasError) { U.toast('Preencha os campos corretamente.', 'warning'); return; }
        if(State.assinantes.find(x=>x.telefone===tel)) { els[1]?.classList.add('error-border'); U.toast('Telefone já cadastrado.','error'); return; }
        
        const btn = document.getElementById('btn-cadastrar');
        if(btn) { btn.innerText = 'Salvando...'; btn.disabled = true; }

        const dataVencStr = U.calcVencimento(venc);
        const hashedPin = await U.hash(pin);

        const novo = {
            id: 'c-'+Date.now(),
            nome, telefone:tel, senhaHash:hashedPin, tipo_plano:tipo, equipamento: (tipo==='guardaria'?equip:''), creditos: 8,
            dia_vencimento:venc, data_vencimento:dataVencStr, ativo:true, primeiro_acesso:true, created_at:new Date().toISOString()
        };
        State.assinantes.push(novo);
        API.save(); 
        await API.sendTicket('client_created', novo);
        U.toast('Cliente cadastrado com sucesso! ✅');
        A.goTo('adminClientes');
    },

        const dates=[];

        for(let i=1;i<=21;i++){
            const d=new Date(); d.setDate(now.getDate()+i);
            if(d.getDay()!==1) dates.push(d.toISOString().split('T')[0]);
            if(dates.length>=12) break;

        const isGuardaria = State.assinante?.tipo_plano === 'guardaria';

        const sd=State.bookingForm.data, st=State.bookingForm.horario;

                State.bookingForm.caiaqueId = sk;

            }
            return `<button onclick="A.selDate('${d}')" type="button"
                class="px-3 py-2.5 rounded-2xl border text-xs font-black uppercase text-center shrink-0 min-w-[64px] transition-all
                       ${active?'bg-remopink text-white border-remopink shadow-glow scale-105':'bg-white/90 text-slate-600 border-slate-200'}">
                ${parts[0]}<br><span class="text-[9px] font-semibold lowercase opacity-80">${parts[1]||''}</span>
            </button>`;
        }).join('');

        const timeOpts=sd?times.map(t=>`
            <button onclick="A.selTime('${t}')" type="button"

                       ${st===t?'bg-gradient-to-r from-remoblue to-remoblue-dark text-white border-remoblue/50 shadow-float scale-[1.02]':'bg-white/80 text-slate-600 border-slate-200 hover:bg-white hover:border-remoblue/30'}">
                <span class="text-2xl drop-shadow-sm">${t==='06:00'?'🌅':t==='07:00'?'🌤️':t==='08:00'?'☀️':t==='09:00'?'😎':'🚣'}</span>
                ${t}
            </button>`).join(''):'';

        let kayakHtml='';
        if(sd&&st){
            if(isGuardaria && State.assinante?.equipamento) {
                const c = State.caiaques.find(x=>x.id===State.assinante.equipamento);
                if(c) {
                    kayakHtml=`<div class="glass-card flex justify-between items-center border-l-4 border-l-remopink bg-remopink/5">
                        <div><p class="text-sm font-black text-slate-800">${c.nome}</p><p class="text-[9px] font-black text-remopink uppercase tracking-widest mt-0.5">Seu Equipamento Vinculado</p></div>
                        <span class="text-2xl">✅</span>
                    </div>`;
                } else {
                    kayakHtml=`<p class="text-center py-6 text-xs text-red-500 font-bold">Equipamento vinculado não encontrado na base.</p>`;
                }
            } else {
                const avail=State.caiaques.filter(c=>c.status!=='inoperante');
                kayakHtml=avail.length===0?`<p class="text-center py-6 text-xs text-slate-400 font-bold">Nenhum caiaque disponível.</p>`:
                    avail.map(c=>{
                        const ok=A.kayakAvail(c.id,sd,st), act=sk===c.id;
                        if(!ok) return `<div class="glass-card flex justify-between items-center border-l-4 border-l-red-300 opacity-50"><div><p class="text-sm font-black text-slate-400">${c.nome}</p><p class="text-[9px] font-bold text-red-400 uppercase mt-0.5">Indisponível neste horário 🔒</p></div></div>`;
                        return `<div onclick="A.selKayak('${c.id}')" class="glass-card flex justify-between items-center border-l-4 ${act?'border-l-remopink bg-remopink/5 scale-[1.01]':'border-l-remogreen hover:bg-white/90'} transition-all cursor-pointer">
                            <div><p class="text-sm font-black text-slate-800">${c.nome}</p><p class="text-[9px] font-black text-remogreen uppercase tracking-widest mt-0.5">✓ Disponível na Base</p></div>
                            <span class="text-2xl">${act?'✅':'🛶'}</span>
                        </div>`;
                    }).join('');
            }
        }

        return `
            <div class="space-y-5 flex-1 flex flex-col animate-fade-up">
                <div class="bg-gradient-to-r from-remoblue to-remoblue-dark p-4 rounded-3xl border-2 border-white/50 shadow-float text-white flex justify-between items-center">
                    <h3 class="text-base font-black uppercase italic">🛶 Agendar Navegação</h3>
                    <button onclick="A.goTo('home')" class="px-3 py-2 bg-white/10 hover:bg-white/20 rounded-xl text-[9px] font-black uppercase border border-white/25 active:scale-95 transition-all">Voltar</button>

                ${sd?`<div class="space-y-2 animate-fade-up">
                    <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest ml-1 flex items-center gap-1.5"><span class="w-4 h-4 bg-remoblue text-white rounded-full flex items-center justify-center text-[8px]">2</span>Horário de Saída</p>

                ${sd&&st?`<div class="space-y-2 animate-fade-up">

                    <div class="space-y-2">${kayakHtml}</div>
                </div>`:''}
                ${sd&&st&&sk?`
                <div class="space-y-3 pt-4 border-t-2 border-white/60 mt-auto animate-fade-up">
                    <label class="flex items-start gap-3 bg-white/80 p-4 rounded-2xl border-2 border-white/90 cursor-pointer hover:bg-white transition-all shadow-sm">
                        <input type="checkbox" id="termos-uso" class="mt-0.5 w-5 h-5 accent-remopink shrink-0"
                               onchange="const b=document.getElementById('btn-sub');b.disabled=!this.checked;b.style.opacity=this.checked?'1':'0.5'">

                        </span>
                    </label>
                    <button id="btn-sub" onclick="A.submitBooking()" disabled style="opacity:0.5"
                            class="w-full py-4 bg-gradient-to-r from-remopink to-remopink-dark text-white font-black rounded-2xl shadow-glow active:scale-95 transition-all uppercase tracking-widest text-sm border border-white/20 flex items-center justify-center gap-2">
                        <span>Confirmar Agendamento</span> <span class="text-xl">✅</span>
                    </button>
                </div>`:`
                <div class="mt-auto pt-6 pb-2 animate-fade-up">
                    <div class="bg-white/40 p-6 rounded-3xl border border-white/70 text-center shadow-sm backdrop-blur-sm relative overflow-hidden">

                        <p class="text-[10px] font-black text-slate-500 uppercase tracking-[0.2em] relative z-10">Conclua as etapas acima</p>

                    </div>
                </div>`}
            </div>`;
    },

    Calendario: ()=>{
        const m=State.calMonth, y=m.getFullYear(), mo=m.getMonth();
        const daysInM=U.daysInMonth(y,mo);
        const firstDow=new Date(y,mo,1).getDay(); // 0=Dom
        const todayStr=U.todayStr();
        const weekdays=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
        const myBkgs=State.agendamentos.filter(a=>a.assinante_id===State.assinante.id&&a.status!=='cancelado');
        const nowTime = new Date();
        const minDate = new Date();
        if (nowTime.getHours() >= 19) {
            minDate.setDate(minDate.getDate() + 2);
        } else {
            minDate.setDate(minDate.getDate() + 1);
        }
        const minDateStr = minDate.getFullYear() + '-' + String(minDate.getMonth()+1).padStart(2,'0') + '-' + String(minDate.getDate()).padStart(2,'0');


        const cells=[];
        const maxDate = new Date();
        maxDate.setHours(0,0,0,0);
        const daysUntilSunday = (7 - maxDate.getDay()) % 7;
        maxDate.setDate(maxDate.getDate() + daysUntilSunday);
        if (new Date().getDay() === 0) maxDate.setDate(maxDate.getDate() + 7);
        const maxDateStr = maxDate.getFullYear() + '-' + String(maxDate.getMonth()+1).padStart(2,'0') + '-' + String(maxDate.getDate()).padStart(2,'0');

        for(let i=0;i<firstDow;i++) cells.push(`<div></div>`);
        for(let d=1;d<=daysInM;d++){
            const ds=`${y}-${String(mo+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            const dow=new Date(ds+'T12:00:00').getDay();
            const isPast=ds<minDateStr;
            const isFutureBlocked = ds > maxDateStr;
            const isClosed=dow===1 || State.diasFechados.includes(ds) || isFutureBlocked;
            const isToday=ds===todayStr;
            const hasBooking=myBkgs.some(a=>a.data_reserva===ds);
            const isAvail=!isPast&&!isClosed;

            let cls='cal-day';
            let dot='';
            if(isPast) cls+=' past';
            else if(isClosed) cls+=' closed';
            else if(hasBooking){ cls+=' booked'; dot=`<span class="dot" style="background:#E52E87"></span>`; }
            else cls+=' available';
            if(isToday) cls+=' today';

            var cellClick = (isAvail && !hasBooking) ? ('onclick="A.selDate(\'' + ds + '\');A.goTo(\'agendar\')"') : '';
            var todayBadge = isToday ? '<span style="position:absolute;top:2px;right:3px;font-size:.42rem;font-weight:900;color:#E52E87">HOJE</span>' : '';
            cells.push('<div class="' + cls + '" ' + cellClick + '>' + d + dot + todayBadge + '</div>');
        }

        const legend=[
            {color:'rgba(118,192,67,.3)',border:'rgba(118,192,67,.5)',label:'Disponível'},
            {color:'rgba(229,46,135,.15)',border:'rgba(229,46,135,.35)',label:'Reservado'},
            {color:'rgba(148,163,184,.12)',border:'rgba(148,163,184,.2)',label:'Fechado'}
        ];

        return `
            <div class="space-y-4 animate-fade-up">
                <div class="bg-gradient-to-r from-remoblue to-remoblue-dark p-4 rounded-3xl border-2 border-white/50 shadow-float text-white">
                    <p class="text-[8px] font-black text-blue-200 uppercase tracking-[0.2em] mb-1">Disponibilidade</p>
                    <h2 class="text-lg font-black uppercase">Calendário</h2>
                </div>

                <!-- Navegação mês -->
                <div class="glass-card flex items-center justify-between py-3">
                    <button onclick="A.prevMonth()" class="w-9 h-9 flex items-center justify-center text-remoblue bg-blue-50 rounded-xl active:scale-90 transition-all text-lg font-black">◀</button>
                    <p class="text-sm font-black text-slate-800 uppercase tracking-widest">${U.monthName(m)}</p>
                    <button onclick="A.nextMonth()" class="w-9 h-9 flex items-center justify-center text-remoblue bg-blue-50 rounded-xl active:scale-90 transition-all text-lg font-black">▶</button>
                </div>

                <!-- Grade dias da semana -->
                <div class="glass-card p-3">
                    <div class="grid grid-cols-7 gap-1 mb-2">
                        ${weekdays.map(w=>`<div style="font-size:.6rem;font-weight:900;text-transform:uppercase;color:${w==='Dom'||w==='Sáb'?'#E52E87':'#64748b'};text-align:center">${w}</div>`).join('')}
                    </div>
                    <div class="grid grid-cols-7 gap-1">${cells.join('')}</div>
                </div>

                <!-- Legenda -->
                <div class="glass-card py-3">
                    <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-2.5 text-center">Legenda</p>
                    <div class="flex justify-center flex-wrap gap-3">
                        ${legend.map(l=>`
                            <div class="flex items-center gap-1.5">
                                <span style="width:14px;height:14px;border-radius:5px;background:${l.color};border:1.5px solid ${l.border};display:inline-block;flex-shrink:0"></span>
                                <span style="font-size:.68rem;font-weight:800;color:#64748b;text-transform:uppercase">${l.label}</span>
                            </div>`).join('')}

            <div>
                <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest text-center mb-2">Movimentação do Dia</p>
                ${list||'<div class="text-center py-6 glass-card border-dashed border-2"><p class="text-[10px] font-black text-slate-400 uppercase">Nenhuma reserva para hoje</p></div>'}
            </div>
            <button onclick="A.logout()" class="w-full py-3 bg-red-50 text-red-600 font-black rounded-xl uppercase tracking-widest text-xs border border-red-200 mt-4 active:scale-95">Encerrar Sessão</button>
        </div>`;
    },
    AdminClientes: ()=>{
        const fil = State.adminClientFilter || 'all';
        const filtrados = State.assinantes.filter(a => {
            if(fil === 'all') return true;
            const dv = a.data_vencimento ? new Date(a.data_vencimento+'T12:00:00') : new Date();
            const vencido = dv < new Date();
            if(fil === 'ativos') return !vencido;
            if(fil === 'vencidos') return vencido;
            return true;
        });

        const list=filtrados.map(a=>{
            let vStr = '';
            let isVencido = false;
            if(a.data_vencimento) {
                const v = new Date(a.data_vencimento+'T12:00:00');
                const diff = Math.ceil((v - new Date())/(1000*60*60*24));
                isVencido = diff < 0;
                vStr = `<p class="text-[9px] mt-1 font-bold ${isVencido?'text-red-500':'text-slate-500'}">Venc: ${v.toLocaleDateString('pt-BR')} ${isVencido?'(Vencido)':''}</p>`;
            }
            return `<div class="glass-card p-3 mb-2 border-l-4 ${a.tipo_plano==='guardaria'?'border-remogreen':'border-remopink'}">
                <div class="flex justify-between items-start">
                    <div class="min-w-0">
                        <p class="text-sm font-black text-slate-800 truncate">${a.nome}</p>
                        <p class="text-[9px] text-slate-500 font-bold">${U.fmtPhone(a.telefone)} | ${a.tipo_plano||'mensalista'}</p>
                    </div>
                    <div class="flex flex-col items-end gap-1">
                        <span class="text-[8px] font-black px-2 py-0.5 rounded uppercase ${a.tipo_plano==='guardaria'?'bg-green-100 text-green-700':'bg-pink-100 text-pink-700'}">${a.tipo_plano}</span>
                        ${isVencido ? `<button onclick="A.renovarMensalidade('${a.id}')" class="text-[8px] font-black bg-emerald-50 text-emerald-600 border border-emerald-200 px-2 py-0.5 rounded uppercase active:scale-95">💳 Renovar</button>` : ''}
                        <button onclick="A.openEditCliente('${a.id}')" class="text-[8px] font-black bg-slate-100 text-slate-600 border border-slate-200 px-2 py-0.5 rounded uppercase active:scale-95">✏️ Editar</button>
                        <button onclick="A.deleteCliente('${a.id}')" class="text-[8px] font-black bg-red-50 text-red-500 border border-red-200 px-2 py-0.5 rounded uppercase active:scale-95">🗑 Excluir</button>
                    </div>
                </div>
                ${a.tipo_plano==='guardaria'&&a.equipamento?`<p class="text-[9px] mt-1 text-slate-500 font-bold uppercase">🛶 ${a.equipamento}</p>`:''}
                ${vStr}
            </div>`;
        }).join('');

        const btnAtivo = (f) => f === fil ? 'bg-slate-800 text-white border-slate-800' : 'bg-white text-slate-500 border-slate-200';

        const diasOptions = Array.from({length: 31}, (_, i) => `<option value="${i+1}">${i+1}</option>`).join('');

        return `<div class="space-y-4 animate-fade-up pb-8">
            <div class="bg-gradient-to-r from-remoblue to-remoblue-dark p-4 rounded-3xl border-2 border-white/50 shadow-float text-white">
                <h2 class="text-lg font-black uppercase">Gestão de Clientes</h2>
            </div>
            <div class="glass-card p-4 space-y-3 border-t-4 border-t-remopink">
                <p class="text-[10px] font-black text-slate-800 uppercase tracking-widest mb-1 pb-1 border-b">Novo Cadastro</p>
                <input type="text" id="c-nome" placeholder="Nome Completo" class="custom-input !py-2 !text-sm">
                <input type="tel" id="c-tel" placeholder="(13) 12345-6789" class="custom-input !py-2 !text-sm" oninput="U.maskPhone(this)">
                <input type="text" id="c-pin" placeholder="Senha PIN (6 dígitos)" maxlength="6" class="custom-input !py-2 !text-sm">
                <select id="c-tipo" class="custom-input !py-2 !text-sm" onchange="document.getElementById('equip-wrap').style.display=this.value==='guardaria'?'block':'none'">
                    <option value="mensalista">Mensalista (Caiaque da base)</option>
                    <option value="guardaria">Guardaria (Equipamento próprio)</option>
                </select>
                <div id="equip-wrap" style="display:none">
                    <select id="c-equip" class="custom-input !py-2 !text-sm mt-2">
                        <option value="">-- Escolha o Equipamento --</option>
                        ${State.caiaques.map(c=>`<option value="${c.id}">${c.nome}</option>`).join('')}
                    </select>
                </div>
                <div>
                    <p class="text-[9px] font-bold text-slate-400 ml-1 mb-0.5 uppercase tracking-widest">Dia de Vencimento</p>
                    <select id="c-venc" class="custom-input !py-2 !text-sm text-center">
                        <option value="">-- Selecione o Dia --</option>
                        ${diasOptions}
                    </select>
                </div>
                <button id="btn-cadastrar" onclick="A.cadastrarCliente()" class="w-full py-3 bg-gradient-to-r from-remopink to-remopink-dark text-white font-black rounded-xl uppercase tracking-widest text-xs active:scale-95 shadow-glow mt-2">Salvar Cliente</button>
            </div>
            
            <div>
                <div class="flex items-center justify-between mb-3">
                    <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest">Lista Cadastrada (${filtrados.length})</p>
                    <div class="flex gap-1">
                        <button onclick="A.setClientFilter('all')" class="text-[8px] font-black px-2 py-1 rounded uppercase border active:scale-95 transition-all ${btnAtivo('all')}">Todos</button>
                        <button onclick="A.setClientFilter('ativos')" class="text-[8px] font-black px-2 py-1 rounded uppercase border active:scale-95 transition-all ${btnAtivo('ativos')}">Ativos</button>
                        <button onclick="A.setClientFilter('vencidos')" class="text-[8px] font-black px-2 py-1 rounded uppercase border active:scale-95 transition-all ${btnAtivo('vencidos')}">Vencidos</button>
                    </div>
                </div>
                ${list||'<div class="text-center py-6 glass-card border-dashed border-2"><p class="text-[10px] font-black text-slate-400 uppercase">Nenhum cliente neste filtro.</p></div>'}
            </div>
        </div>`;
    },
    AdminCalendario: ()=>{
        const m=State.calMonth, y=m.getFullYear(), mo=m.getMonth();
        const daysInM=U.daysInMonth(y,mo);
        const firstDow=new Date(y,mo,1).getDay();
        const cells=[];
        for(let i=0;i<firstDow;i++) cells.push(`<div></div>`);
        for(let d=1;d<=daysInM;d++){
            const ds=`${y}-${String(mo+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            const dow=new Date(ds+'T12:00:00').getDay();
            const isClosed=State.diasFechados.includes(ds);
            const isSeg=dow===1;
            let cls='cal-day border-2 '+(isSeg?'opacity-40 pointer-events-none':'cursor-pointer active:scale-90');
            if(isClosed) cls+=' bg-red-100 border-red-300 text-red-600';
            else cls+=' bg-white border-slate-200 text-slate-700';
            cells.push('<div class="' + cls + '" onclick="A.toggleDia(\'' + ds + '\')">' + d + '</div>');
        }
        return `<div class="space-y-4 animate-fade-up pb-8">
            <div class="bg-gradient-to-r from-remoblue to-remoblue-dark p-4 rounded-3xl border-2 border-white/50 shadow-float text-white">
                <p class="text-[8px] font-black text-blue-200 uppercase tracking-[0.2em] mb-1">Gerenciar Dias</p>
                <h2 class="text-lg font-black uppercase">Abrir / Fechar</h2>
            </div>
            <div class="glass-card p-4">
                <p class="text-[10px] font-black text-slate-500 uppercase leading-relaxed mb-4 text-center">Clique em um dia para bloquear (chuva/manutenção) ou reabrir. Segundas já são fechadas por padrão.</p>
                <div class="flex items-center justify-between py-3 border-b mb-3 border-slate-100">
                    <button onclick="A.prevMonth()" class="w-9 h-9 flex items-center justify-center text-remoblue bg-blue-50 rounded-xl active:scale-90 transition-all font-black">◀</button>
                    <p class="text-sm font-black text-slate-800 uppercase tracking-widest">${U.monthName(m)}</p>
                    <button onclick="A.nextMonth()" class="w-9 h-9 flex items-center justify-center text-remoblue bg-blue-50 rounded-xl active:scale-90 transition-all font-black">▶</button>
                </div>
                <div class="grid grid-cols-7 gap-1.5 mb-2 text-center text-[10px] font-black text-slate-400 uppercase tracking-widest">
                    <span>Dom</span><span>Seg</span><span>Ter</span><span>Qua</span><span>Qui</span><span>Sex</span><span>Sáb</span>
                </div>
                <div class="grid grid-cols-7 gap-1.5">${cells.join('')}</div>
            </div>
        </div>`;
    }
};
// ═══════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════
window.addEventListener('DOMContentLoaded', async ()=>{
    // Inicializa: primeiro hidrata do local (instantaneo), depois sincroniza nuvem em background
    await DB.hydrate();
    try {
        const saved=localStorage.getItem(SESSION_KEY);
        if(saved){ State.assinante=JSON.parse(saved); State.currentPage='home'; }
        const prof=localStorage.getItem(PROFILE_KEY);
        if(prof) State.profileData={...State.profileData,...JSON.parse(prof)};
        State.avaliacoes=JSON.parse(localStorage.getItem('plorix_avaliacoes')||'[]');
        State.diasFechados=JSON.parse(localStorage.getItem('plorix_dias_fechados')||'[]');
    } catch(e){ localStorage.removeItem(SESSION_KEY); }
    A.render(); // Renderiza imediatamente com dados locais
    // Sincroniza nuvem em background sem bloquear
    API.loadData().then(()=>A.render()).catch(()=>{});
    // Refresh periodico (so pull, sem sobrescrever se mudancas locais pendentes)
    setInterval(()=>{ if(State.currentPage!=='login'&&State.currentPage!=='forcePasswordChange'){ API.loadData().then(()=>A.render()).catch(()=>{}); }}, 90000);
});
</script>
</body>
</html>
