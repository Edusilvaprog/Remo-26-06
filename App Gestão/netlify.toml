[build]
  publish = "."

[[headers]]
  for = "/vertice-sw.js"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' blob: https://cdn.tailwindcss.com https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' blob: https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://res.cloudinary.com blob:; connect-src 'self' https://api.cloudinary.com https://*.supabase.co https://api.open-meteo.com; media-src 'self' blob:; worker-src 'self' blob:; frame-src 'self' https://embed.windy.com;"
