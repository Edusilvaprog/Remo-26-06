    <!-- Tailwind Fallback Logic -->
    <script>
        function handleTailwindError() {
            console.error("Erro ao carregar o Tailwind CSS da CDN.");
            if (navigator.onLine) {
                const reloads = parseInt(sessionStorage.getItem('tailwind_reload_count') || '0', 10);
                if (reloads < 3) {
                    sessionStorage.setItem('tailwind_reload_count', String(reloads + 1));
                    if ('caches' in window || 'serviceWorker' in navigator) {
                        Promise.all([
                            'caches' in window ? caches.keys().then(keys => Promise.all(keys.map(k => caches.delete(k)))) : Promise.resolve(),
                            'serviceWorker' in navigator ? navigator.serviceWorker.getRegistrations().then(regs => Promise.all(regs.map(r => r.unregister()))) : Promise.resolve()
                        ]).then(() => window.location.reload(true));
                    }
                } else {
                    alert("Erro ao carregar os estilos (Tailwind CDN). Verifique a sua ligação à internet ou tente novamente mais tarde.");
                }
            } else {
                alert("Sem ligação à internet. É necessário estar online na primeira inicialização para carregar os estilos visuais.");
            }
        }
    </script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com" onerror="handleTailwindError()"></script>
    <script>

            tailwind.config = {
                darkMode: 'class',

        }

        #modal-foto-upload { z-index: 310; }
        #modal-foto-upload .foto-panel {
            position: fixed;
            left: 50%;

        body.foto-upload-open {
            overflow: hidden;
            position: fixed;
            width: 100%;
        }

        /* ===== TOAST / ALERT SYSTEM — mobile-safe ===== */
        .plorix-toast {
            position: fixed;
            /* Respeita notch/safe area no topo + margem extra */
            top: calc(env(safe-area-inset-top, 0px) + 1rem);
            /* Centraliza horizontalmente sem conflito de transform */
            left: 50%;
            transform: translateX(-50%) translateY(-20px);
            opacity: 0;
            /* Largura responsiva: ocupa até 88% da tela, max 26rem */
            width: max-content;
            max-width: min(88vw, 26rem);
            min-width: 200px;
            /* Visual */
            background: rgba(15, 23, 42, 0.96);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            color: #f8fafc;
            border: 1.5px solid rgba(255,255,255,0.18);
            border-radius: 999px;
            padding: 0.75rem 1.25rem;
            box-shadow: 0 8px 32px rgba(0,0,0,0.45), 0 0 0 1px rgba(255,255,255,0.06);
            z-index: 99999;
            pointer-events: none;
            /* Layout interno */
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.55rem;
            /* Tipografia */
            font-family: 'Nunito', system-ui, sans-serif;
            font-weight: 800;
            font-size: 0.8rem;
            letter-spacing: 0.04em;
            text-align: center;
            line-height: 1.3;
            /* Transição suave */
            transition: opacity 0.28s ease, transform 0.28s cubic-bezier(0.34, 1.56, 0.64, 1);
            will-change: opacity, transform;
        }
        .plorix-toast-icon {
            font-size: 1.15rem;
            line-height: 1;
            flex-shrink: 0;
        }
        .plorix-toast-msg {
            /* Permite quebra de linha apenas se necessário */
            word-break: break-word;
        }
        /* Estado: visível */
        .plorix-toast-show {
            opacity: 1;
            transform: translateX(-50%) translateY(0px);
        }
        /* Estado: saindo */
        .plorix-toast-hide {
            opacity: 0;
            transform: translateX(-50%) translateY(-16px);
            transition: opacity 0.3s ease, transform 0.3s ease;
        }
    </style>
</head>
<body class="antialiased transition-colors duration-300">

    <div id="plorix-splash" role="status" aria-live="polite" aria-label="A carregar Remoterapia">
        <img class="splash-logo" src="logo.png" style="width: auto; max-width: 80%; height: 120px; object-fit: contain;" alt="Remoterapia" onerror="this.style.display='none'">
        <p class="splash-title mt-4">Remoterapia</p>
    </div>

    <!-- Container Transparente (Mobile view wrapper) -->
    <div id="root" class="max-w-md mx-auto min-h-screen flex flex-col relative font-sans transition-colors duration-300"></div>

    <!-- Modal Supabase -->
    <div id="modal-sync" class="fixed inset-0 hidden z-[9998] bg-slate-900/60 backdrop-blur-sm overflow-y-auto">
        <div class="flex p-4 min-h-[100dvh]">
            <div class="m-auto w-full max-w-md bg-white dark:bg-slate-900 rounded-3xl shadow-float border-2 border-white/60 dark:border-slate-700 overflow-hidden">
                <div class="bg-gradient-to-r from-blue-600 to-cyan-500 px-5 py-4 flex justify-between items-center">

                        <p class="text-[9px] font-black text-blue-100 uppercase tracking-wider">Nuvem da equipa</p>

                    <div>

                    <label class="flex items-center gap-3 cursor-pointer p-3 bg-slate-50 dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-700">

                    </div>

                </div>

    <script>
        window.alert = function(msg) {
            // Remove qualquer toast existente para evitar empilhamento
            document.querySelectorAll('.plorix-toast').forEach(t => t.remove());

            const toast = document.createElement('div');

                if (path && path !== '#/login' && path !== '#/selecionar-perfil') {
                    localStorage.setItem('plorix_last_route', path);
                }
                if (window.location.hash !== path) {
                    window.location.hash = path;
                } else {
                    this.currentPath = path;
                    this.handleRoute();
                }
            },
            handleRoute: function() {
                const hash = this.currentPath;
                const parts = hash.replace('#/', '').split('/');
                const section = parts[0]; 
                const page = parts[1] || 'home';

                if (section === 'login') {
                    State.role = null;
                    Actions.clearAppAutoSync();
                    Actions.clearAuthScreenTheme();
                    document.getElementById('root').innerHTML = Components.LoginScreen();
                } else if (section === 'selecionar-perfil') {
                    if (!State.currentUser) return this.navigate('#/login');
                    const roles = Actions.getUserRoles(State.currentUser);
                    if (roles.length <= 1) {
                        return roles.length ? this.navigate(`#/${roles[0]}/home`) : this.navigate('#/login');
                    }
                    State.role = null;
                    Actions.clearAppAutoSync();
                    Actions.clearAuthScreenTheme();
                    document.getElementById('root').innerHTML = Components.SelectRoleScreen();
                } else {
                    if (!State.currentUser) return this.navigate('#/login');
                    Actions.applyAppTheme();
                    if (!Actions.canAccessRole(State.currentUser, section)) {
                        const roles = Actions.getUserRoles(State.currentUser);
                        if (roles.length === 1) return this.navigate(`#/${roles[0]}/home`);
                        return this.navigate('#/selecionar-perfil');
                    }

                    State.role = section;
                    State.page = page;
                    if (section === 'guardaria' && !['frota', 'agendamentos', 'diario', 'clientes', 'bloqueios'].includes(page)) {
                        State.page = 'frota';
                    }

                    const active = document.activeElement;
                    const activeId = active ? active.id : null;
                    const activeStart = active && active.tagName !== 'SELECT' ? active.selectionStart : null;
                    const activeEnd = active && active.tagName !== 'SELECT' ? active.selectionEnd : null;

                    document.getElementById('root').innerHTML = Components.AppLayout();
                    
                    if (activeId) {
                        setTimeout(() => {
                            const el = document.getElementById(activeId);
                            if (el && (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA' || el.tagName === 'SELECT')) {
                                el.focus();
                                if (el.tagName !== 'SELECT' && activeStart !== null) {
                                    el.setSelectionRange(activeStart, activeEnd);
                                }
                            }
                        }, 0);
                    }
                    
                    Actions.setupAppAutoSync();
                    if (State.db?.sos?.ativo && Actions.canViewSOSAlert()) {
                        const nowMs = Date.now();
                        if (!State._lastSosBeepAt || (nowMs - State._lastSosBeepAt) > 45000) {
                            State._lastSosBeepAt = nowMs;
                            Actions.playAlertSound();
                        }
                    }
                    if (State.page === 'clima') Actions.fetchWeather(false);
                    if (State.role === 'dona' && State.page === 'home') {

            normalizeUsername: (val) => val.trim().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, ''),

            hashPassword: async (plain) => {
                if (window.crypto && crypto.subtle) {
                    try {
                        const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(plain));
                        return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
                    } catch(e) { console.error('Crypto error', e); }
                }
                // Fallback robusto caso não haja HTTPS ou crypto falhe
                let hash = 0;
                for (let i = 0; i < plain.length; i++) {
                    const chr = plain.charCodeAt(i);
                    hash = ((hash << 5) - hash) + chr;
                    hash |= 0;
                }
                return hash.toString(16);
            },

            ensureCloudReady: async (options = {}) => {
                const silent = options.silent !== false;
                if (!Sync.isEnabled()) {
                    Actions.setCloudStatus('error');
                    return { ok: false };
                }
                if (!navigator.onLine) {
                    Actions.setCloudStatus('offline');
                    return { ok: false };
                }
                Actions.setCloudStatus('syncing');
                const c = Sync.getConfig();
                const test = await Sync.testConnection(c.url, c.anonKey);
                if (!test.ok) {
                    Actions.setCloudStatus('error');
                    if (!silent) alert('Nuvem indisponível.\n\n' + test.msg);
                    return { ok: false, msg: test.msg };
                }
                const pull = await Sync.pull();
                if (!pull.ok) {
                    Actions.setCloudStatus('error');
                    if (!silent) alert('Não foi possível buscar dados da equipa.\n\n' + (pull.msg || ''));
                    return { ok: false, msg: pull.msg };
                }
                Actions.rebindCurrentUser();
                Actions.setCloudStatus('ok');
                return { ok: true };

                if (State.role !== 'instrutor' && State.role !== 'recepcao') return;

                const nowMs = Date.now();
                if (nowMs - (State.lastOverdueAlertAt || 0) < 120000) return;
                State.lastOverdueAlertAt = nowMs;
                if (navigator.vibrate) navigator.vibrate([200, 100, 200]);

            playAlertSound: () => {
                try {
                    const AudioCtx = window.AudioContext || window.webkitAudioContext;
                    if (!AudioCtx) return;
                    if (!window._sharedAudioCtx) window._sharedAudioCtx = new AudioCtx();
                    const ctx = window._sharedAudioCtx;
                    if (ctx.state === 'suspended') ctx.resume();
                    const beep = (freq, start) => {
                        const osc = ctx.createOscillator();
                        const gain = ctx.createGain();
                        osc.connect(gain);
                        gain.connect(ctx.destination);
                        osc.frequency.value = freq;
                        gain.gain.setValueAtTime(0.25, start);
                        gain.gain.exponentialRampToValueAtTime(0.01, start + 0.4);
                        osc.start(start);
                        osc.stop(start + 0.4);
                    };
                    beep(880, ctx.currentTime);
                    beep(660, ctx.currentTime + 0.35);
                } catch (e) { /* áudio indisponível */ }
            },

            weatherCodeToEmoji: (code) => {

                if (code <= 82) return '🌦️';
                return '⛈️';

            weatherCodeToDesc: (code) => {

                try {
                    const url = `https://api.open-meteo.com/v1/forecast?latitude=${WEATHER_LAT}&longitude=${WEATHER_LON}&current=temperature_2m,wind_speed_10m,wind_direction_10m,precipitation,weather_code&daily=weather_code,temperature_2m_max,precipitation_probability_max&timezone=America/Sao_Paulo&forecast_days=5`;
                    const res = await fetch(url);
                    if (!res.ok) throw new Error('API clima');

                    const c = data.current;
                    const dirs = ['N', 'NE', 'E', 'SE', 'S', 'SW', 'W', 'NW'];
                    const windDir = dirs[Math.round((c.wind_direction_10m || 0) / 45) % 8];

                        ventoVelocidade: Math.round(c.wind_speed_10m) + 'km/h',
                        ventoDirecao: windDir,
                        mareAltura: w.mareAltura || '0.4m',
                        mareStatus: w.mareStatus || 'Consultar tábua',
                        chuvaMm: (c.precipitation || 0).toFixed(1) + 'mm',
                        chuvaProb: (data.daily.precipitation_probability_max[0] || 0) + '%',
                        condAtual: Actions.weatherCodeToEmoji(c.weather_code),
                        forecast: data.daily.time.slice(0, 4).map((day, i) => {

                            return {
                                dia: d.toLocaleDateString('pt-BR', { weekday: 'short' }).replace('.', '').slice(0, 3),
                                temp: Math.round(data.daily.temperature_2m_max[i]) + '°',
                                cond: Actions.weatherCodeToEmoji(data.daily.weather_code[i]),
                                desc: Actions.weatherCodeToDesc(data.daily.weather_code[i])

                    return dateObj >= dataInicio && dateObj <= dataFim;

                const rentalsData = State.db.rentals.filter(r => filterRentalByDate(r.entrada));

                let qtdMensalista = 0;

                    if (!isMensalista && ass) isMensalista = true;

                    let val = isRental ? (t.valorOriginal || 0) : (t.valor || 0);
                    let tipoCateg = 'Avulso';

                    if (isMensalista) {
                        if (ass && (ass.tipo_plano === 'guardaria' || ass.tipoPlano === 'guardaria')) { qtdGuardaria++; tipoCateg = 'Guardaria'; }
                        else { qtdMensalista++; tipoCateg = 'Mensalista'; }
                        val = 0; // Zera o valor para relatórios de mensalistas/guardaria
                    } else {
                        qtdAvulso++;
                    }

                    total += val;
                    const k = Actions.normalizePayment(t.pagamento);
                    if (totais[k] !== undefined) totais[k] += val;

                    viagensPdf.push({
                        cliente: t.cliente,
                        data: isRental ? t.entrada.toLocaleDateString('pt-BR') : t.data,
                        entrada: isRental ? t.entrada.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : t.entrada,
                        saida: isRental ? t.previsao.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : t.saida,

                        valor: val,
                        categoria: tipoCateg,

                    });
                };

                historicoData.forEach(h => processTrip(h, false));
                rentalsData.forEach(r => processTrip(r, true));

                viagensPdf.sort((a, b) => {
                    const dateA = a.dataFormatada.split('/').reverse().join('');
                    const dateB = b.dataFormatada.split('/').reverse().join('');
                    return dateA.localeCompare(dateB) || a.entrada.localeCompare(b.entrada);

                const rows = viagensPdf.map(h => `<tr><td>${h.dataFormatada}</td><td>${h.cliente} <small>(${h.categoria})</small></td><td>${h.entrada}–${h.saida}</td><td>${h.pagamento}</td><td>R$ ${Number(h.valor).toFixed(0)}</td></tr>`).join('');
                const pagRows = PAYMENT_METHODS.map(m => `<tr><td>${m}</td><td>R$ ${Number(totais[m] || 0).toFixed(0)}</td></tr>`).join('');
                
                const categRows = `

                    <tr><td>Guardaria</td><td>${qtdGuardaria}</td></tr>
                    <tr><td style="font-weight:bold;">Total de Embarques</td><td style="font-weight:bold;">${qtdAvulso + qtdMensalista + qtdGuardaria}</td></tr>
                `;

                const totalBlock = `<div style="margin-top: 35px; padding: 25px; background-color: #f1f5f9; border: 2px solid #000; text-align: center; border-radius: 8px;">
                    <p style="margin: 0; font-size: 16px; text-transform: uppercase; font-weight: 900; color: #0f172a;">Faturamento Total do Período</p>
                    <h2 style="margin: 5px 0 0; font-size: 32px; color: #0ea5e9; border: none; padding: 0;">R$ ${Math.round(total)},00</h2>
                </div>`;

                Actions.exportPdf(tituloRelatorio, `
                    <h2>Categorias de Embarque</h2><table><thead><tr><th>Categoria</th><th>Quantidade</th></tr></thead><tbody>${categRows}</tbody></table>
                    <h2>Métodos de Pagamentos</h2><table><thead><tr><th>Método</th><th>Valor</th></tr></thead><tbody>${pagRows}</tbody></table>

            openSyncSettings: () => {
                if (!Actions.isAdminUser()) return;
                const c = Sync.getConfig();
                const modal = document.getElementById('modal-sync');
                if (!modal) return;
                document.getElementById('sync-url').value = c.url || '';
                document.getElementById('sync-key').value = c.anonKey || '';
                document.getElementById('sync-enabled').checked = !!c.enabled;
                document.getElementById('sync-status').textContent = Sync.isEnabled() ? 'Sync activo' : 'Sync não configurado';
                modal.classList.remove('hidden');
            },

            closeSyncSettings: () => {
                document.getElementById('modal-sync')?.classList.add('hidden');
            },

            saveSyncSettings: async () => {
                if (!Actions.isAdminUser()) return;
                const url = document.getElementById('sync-url').value.trim();
                const anonKey = document.getElementById('sync-key').value.trim();
                const enabled = document.getElementById('sync-enabled').checked;
                if (enabled && (!url || !anonKey)) {
                    alert('Para activar, preencha URL e chave anon.');
                    return;
                }
                Sync.saveConfig({ url, anonKey, enabled });
                if (enabled) {
                    const test = await Sync.testConnection(url, anonKey);
                    document.getElementById('sync-status').textContent = test.msg;
                    if (!test.ok) { alert(test.msg); return; }
                }
                Actions.closeSyncSettings();
                alert(enabled ? 'Supabase configurado! Use "Sincronizar" na Gestão.' : 'Configuração guardada.');
                Router.handleRoute();
            },

            testSyncSettings: async () => {
                if (!Actions.isAdminUser()) return;
                const url = document.getElementById('sync-url').value.trim();
                const anonKey = document.getElementById('sync-key').value.trim();
                document.getElementById('sync-status').textContent = 'A testar ligação...';
                const test = await Sync.testConnection(url, anonKey);
                document.getElementById('sync-status').textContent = test.msg;
                alert(test.msg);
            },

            runSync: async () => {
                if (!Actions.isAdminUser()) return;
                if (!Sync.isEnabled()) {
                    alert('Configure o Supabase primeiro (⚙️ Supabase).');
                    Actions.openSyncSettings();
                    return;
                }
                const pull = await Sync.pull();
                const push = await Sync.push();
                if (pull.ok && push.ok) {
                    Actions.syncLockerStatus();
                    Router.handleRoute();
                    alert('Sincronização concluída — dados partilhados com a equipa.');
                } else {
                    alert('Sync falhou:\n' + (pull.msg || push.msg || 'Execute plorix-supabase-setup.sql no Supabase e tente novamente.'));
                }
            },

                let fotos = Actions.getFotosSorted();
                if (State.mediaFilter !== 'all') fotos = fotos.filter(f => f.tipo === State.mediaFilter);
                if (State.mediaDateFilter === 'hoje') fotos = fotos.filter(f => f.data === Actions.formatPhotoDate(new Date()));
                else if (State.mediaDateFilter === 'ontem') fotos = fotos.filter(f => f.data === 'Ontem');
                if (State.mediaAutorFilter !== 'all') fotos = fotos.filter(f => f.autor === State.mediaAutorFilter);

            setMediaAutorFilter: (val) => { State.mediaAutorFilter = val; Router.handleRoute(); },

            getUserRoles: (user) => {
                if (!user) return [];
                let roles;
                if (Array.isArray(user.roles) && user.roles.length) roles = [...user.roles];
                else roles = user.role ? [user.role] : [];
                if (roles.includes('dona') || roles.includes('admin')) {
                    if (!roles.includes('guardaria')) roles.push('guardaria');
                }
                return roles;
            },

            canAccessRole: (user, role) => Actions.getUserRoles(user).includes(role),

            isAdminUser: () => State.currentUser && (Actions.getUserRoles(State.currentUser).includes('admin') || Actions.getUserRoles(State.currentUser).includes('dona')),

            canQualidadeEmbarque: () => {
                if (State.role === 'guardaria' || State.role === 'instrutor') return false;
                const u = State.currentUser;
                if (!u) return false;
                return State.role === 'recepcao' && !!(u.permissions && u.permissions.qualidadeEmbarque);
            },

            canAvariaChecklist: () => {
                if (State.role === 'guardaria' || State.role === 'instrutor') return false;
                const u = State.currentUser;
                if (!u) return false;
                return State.role === 'recepcao' && !!(u.permissions && u.permissions.avaria);

                const s = String(status || '').toLowerCase();
                if (s.includes('ativo') || s.includes('pago') || s.includes('dia')) return 'bg-gradient-to-r from-emerald-500 to-emerald-600 text-white border-emerald-700 shadow-sm';
                if (s.includes('pendente')) return 'bg-gradient-to-r from-amber-400 to-amber-500 text-white border-amber-600 shadow-sm';

                return ids.includes(id);
            }),

            getCaiaqueFleetValue: (c) => {
                if (Actions.caiaqueOnWater(c.id)) return 'agua';
                const isReservado = (State.db.agendamentos || []).some(a => String(a.caiaque) === String(c.id));
                if (isReservado) return 'reservado';
                const isLinkedToAssinante = (State.db.assinantes || []).some(a => String(a.caiaqueProprioId) === String(c.id));

                else if (value === 'agua') c.status = 'agua';

            initCheckinViewport: () => {
                const modal = document.getElementById('modal-checkin');
                const panel = modal?.querySelector('.checkin-panel');
                if (!modal || !panel) return;

                const update = () => {
                    if (modal.classList.contains('hidden')) return;
                    const vv = window.visualViewport;
                    if (!vv) return;
                    const keyboardOpen = vv.height < window.innerHeight * 0.82;
                    if (keyboardOpen) {
                        modal.classList.add('keyboard-visible');
                        modal.style.setProperty('--checkin-vvh', vv.height + 'px');
                        modal.style.setProperty('--checkin-vvtop', vv.offsetTop + 'px');
                        panel.style.top = vv.offsetTop + 'px';
                    } else {
                        modal.classList.remove('keyboard-visible');
                        panel.style.top = '0';
                    }
                };

                Actions._checkinViewportHandler = update;
                window.visualViewport?.addEventListener('resize', update);
                window.visualViewport?.addEventListener('scroll', update);
                update();
            },

            destroyCheckinViewport: () => {
                const modal = document.getElementById('modal-checkin');
                const panel = modal?.querySelector('.checkin-panel');
                if (Actions._checkinViewportHandler) {
                    window.visualViewport?.removeEventListener('resize', Actions._checkinViewportHandler);
                    window.visualViewport?.removeEventListener('scroll', Actions._checkinViewportHandler);
                    Actions._checkinViewportHandler = null;
                }
                if (modal) {
                    modal.classList.remove('keyboard-visible');

                const select = document.getElementById('pagamento-pendente-select');

                const r = State.db.rentals.find(item => item.id === id);

            processReturnExecution: (r, wasPendente) => {
                const now = new Date();
                let diff = Math.floor((r.previsao - now) / 60000);
                let extraValue = 0;
                if (diff < 0) {
                    extraValue = Math.floor(Math.abs(diff) / 10) * 5; 
                }
                
                const cfg = State.db.config || { precoBase: 60, precoInstrutor: 70 };
                const basePrice = r.instrutor ? (cfg.precoInstrutor || 70) : (cfg.precoBase || 60);
                let valorBase = r.valorOriginal !== undefined ? r.valorOriginal : (basePrice * r.qtd);
                if (r.assinante_id || r.pagamento === 'Agendamento') {
                    valorBase = 0;
                }
                const totalValue = valorBase + extraValue;

                State.db.history.push({
                    id: Date.now(), cliente: r.cliente, data: now.toLocaleDateString('pt-BR'),
                    entrada: r.entrada.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}),
                    saida: now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}),
                    valor: totalValue, caiaque: r.caiaque, pagamento: r.pagamento
                });
                
                if (wasPendente) {
                    Actions.addToFinancials(r.pagamento, totalValue);
                } else if (extraValue > 0) {
                    Actions.addToFinancials(r.pagamento, extraValue);
                }
                
                State.db.rentals = State.db.rentals.filter(item => item.id !== r.id);
                Actions.persistDb();
                alert('Desembarque finalizado e pagamento recebido.');
                Router.handleRoute();
            },

            photoUploadTipo: null,
            photoUploadQueue: [],

            compressImageFile: (file) => new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        const maxW = 1600;
                        let w = img.width;
                        let h = img.height;
                        if (w > maxW) {
                            h = Math.round(h * (maxW / w));
                            w = maxW;
                        }
                        const canvas = document.createElement('canvas');
                        canvas.width = w;
                        canvas.height = h;
                        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                        resolve(canvas.toDataURL('image/jpeg', 0.88));
                    };
                    img.onerror = () => reject(new Error('Imagem inválida'));
                    img.src = e.target.result;
                };
                reader.onerror = () => reject(new Error('Falha ao ler ficheiro'));
                reader.readAsDataURL(file);
            }),

                const restante = 6 - Actions.photoUploadQueue.length;
                const batch = files.slice(0, restante);
                for (const file of batch) {
                    try {
                        const dataUrl = await Actions.compressImageFile(file);
                        Actions.photoUploadQueue.push({ name: file.name, dataUrl });
                    } catch (err) {
                        alert(`Não foi possível processar: ${file.name}`);

                const tipo = Actions.photoUploadTipo || 'Paisagem';

                const now = new Date();
                const hora = now.toLocaleTimeString('pt-PT', { hour: '2-digit', minute: '2-digit' });
                const baseId = Date.now();

                // Elementos visuais de carregamento
                const btnSave = document.querySelector('#modal-foto-upload button[onclick="Actions.savePhotos()"]');
                const btnCancel = document.querySelector('#modal-foto-upload button[onclick="Actions.closePhotoUpload()"]');
                const originalSaveText = btnSave ? btnSave.innerText : 'Guardar no sistema';

                if (btnSave) {

                    btnSave.classList.add('opacity-70', 'cursor-not-allowed');
                }
                if (btnCancel) {
                    btnCancel.disabled = true;
                    btnCancel.classList.add('opacity-50', 'cursor-not-allowed');
                }

                const cloudName = 'dm1vub9jq';
                const uploadPreset = 'Remoterapia-fotos';
                const uploadedUrls = [];
                const queue = Actions.photoUploadQueue;

                try {
                    for (let i = 0; i < queue.length; i++) {
                        if (btnSave) {
                            btnSave.innerText = `A enviar (${i + 1}/${queue.length})...`;
                        }

                        const item = queue[i];
                        const formData = new FormData();
                        formData.append('file', item.dataUrl);
                        formData.append('upload_preset', uploadPreset);

                        const response = await fetch(`https://api.cloudinary.com/v1_1/${cloudName}/image/upload`, {
                            method: 'POST',
                            body: formData
                        });

                        if (!response.ok) {
                            const err = await response.json().catch(() => ({ error: { message: `Erro HTTP ${response.status}` } }));
                            throw new Error(err.error?.message || 'Falha no envio.');
                        }

                        const resData = await response.json();
                        uploadedUrls.push(resData.secure_url);
                    }

                    // Insere todas as fotos enviadas no estado
                    uploadedUrls.forEach((url, idx) => {
                        State.db.fotos.unshift({
                            id: baseId + idx,
                            tipo,
                            autor,
                            data: Actions.formatPhotoDate(now),
                            hora,
                            img: url,
                            criadoEm: now.toISOString()
                        });
                    });

                    Actions.trimPhotos(MAX_FOTOS_STORED);
                    Actions.persistDb();
                    Actions.closePhotoUpload();
                    alert(`${queue.length} foto(s) guardada(s) com sucesso na nuvem!`);
                    Router.handleRoute();

                } catch (error) {
                    alert(`Erro ao enviar fotos: ${error.message}\nTente novamente.`);
                } finally {
                    if (btnSave) {
                        btnSave.disabled = false;
                        btnSave.innerText = originalSaveText;
                        btnSave.classList.remove('opacity-70', 'cursor-not-allowed');
                    }
                    if (btnCancel) {
                        btnCancel.disabled = false;
                        btnCancel.classList.remove('opacity-50', 'cursor-not-allowed');
                    }
                }
            },

                const pass = document.getElementById('adm-user-pass').value.trim();

                if (document.getElementById('adm-role-rec').checked) roles.push('recepcao');
                if (document.getElementById('adm-role-dona').checked) roles.push('dona');
                if (document.getElementById('adm-role-adm').checked) roles.push('admin');

                if (!name || !login || roles.length === 0) {

                    qualidadeEmbarque: !!document.getElementById('adm-perm-qualidade')?.checked,
                    avaria: !!document.getElementById('adm-perm-avaria')?.checked
                };

                let passHash = null;
                if (pass) passHash = await Actions.hashPassword(pass);

                const existingIdx = State.db.users.findIndex(x => x.username === oldLogin);
                
                if (existingIdx >= 0) {
                    const u = State.db.users[existingIdx];
                    u.name = name;
                    u.username = Actions.normalizeUsername(login);
                    u.roles = roles;
                    u.permissions = permissions;
                    if (passHash) u.passHash = passHash;
                } else {
                    if (State.db.users.find(x => x.username === Actions.normalizeUsername(login))) {
                        alert('Este login já existe.'); return;

                    if (!passHash) { alert('Senha obrigatória para novo usuário.'); return; }
                    State.db.users.push({
                        username: Actions.normalizeUsername(login),
                        name: name,
                        roles: roles,
                        permissions: permissions,
                        passHash: passHash
                    });

            renovarMensalidade: (id) => {
                const c = State.db.assinantes.find(x => x.id === id);
                if (c) {
                    if (c.data_vencimento) {
                        const today = new Date();
                        today.setHours(0,0,0,0);
                        const vd = new Date(c.data_vencimento + 'T00:00:00');
                        if (vd > today) {
                            alert('A mensalidade ainda não está vencida. Só é possível renovar após o vencimento.');
                            return;
                        }
                    }

                    if (!window.confirm('Deseja confirmar o pagamento e renovar a mensalidade de ' + c.nome + ' por 1 mês?')) return;
                    
                    const dateBase = c.data_vencimento ? new Date(c.data_vencimento + 'T12:00:00') : new Date();
                    const now = new Date();
                    if (dateBase < now && (now - dateBase) > 86400000 * 30) {
                        dateBase.setTime(now.getTime());
                    }
                    dateBase.setMonth(dateBase.getMonth() + 1); // Exatamente 1 mês
                    
                    c.data_vencimento = dateBase.toISOString().split('T')[0];
                    c.statusPagamento = 'ativo';
                    c.creditos = 8; // Resetando para um mês inteiro (e.g. 2 por semana)
                    c.bloqueado = false; // Auto-unblock if they were blocked
                    
                    Actions.audit('Mensalidade de ' + c.nome + ' renovada para ' + c.data_vencimento + '.');
                    Actions.persistDb();
                    Router.handleRoute();
                    window.alert('Mensalidade de ' + c.nome + ' renovada com sucesso! Vencimento atualizado no cartao.');
                }

            salvarAgendamentoManual: () => {
                const tipo = document.getElementById('add-agen-tipo')?.value;
                const clienteText = document.getElementById('add-agen-cliente')?.value;
                const assinanteId = document.getElementById('add-agen-assinante')?.value;
                const entrada = document.getElementById('add-agen-entrada')?.value;
                const saida = document.getElementById('add-agen-saida')?.value;
                const caiaque = document.getElementById('add-agen-caiaque')?.value;
                
                if (!entrada || !saida || !caiaque) {
                    return alert('Preencha horários e embarcação!');
                }
                if (tipo === 'avulso' && !clienteText) return alert('Informe o nome do cliente.');
                if (tipo === 'assinante' && !assinanteId) return alert('Selecione o mensalista.');

                let nomeCliente = clienteText;
                let assData = null;

                if (tipo === 'assinante') {
                    assData = (State.db.assinantes || []).find(x => String(x.id) === String(assinanteId));
                    if (assData) {
                        nomeCliente = assData.nome;
                        const isGuardaria = (assData.tipo_plano === 'guardaria' || assData.tipoPlano === 'guardaria');
                        const roles = Actions.getUserRoles(State.currentUser);
                        const isAdminOrDona = roles.includes('admin') || roles.includes('dona');
                        if (!isGuardaria && (assData.creditos === undefined || parseInt(assData.creditos) <= 0)) {
                            if (!isAdminOrDona) {
                                alert('Aviso: Cliente não possui remadas semanais disponíveis. Apenas Admin/Dona podem forçar a liberação.');
                                return;
                            } else {
                                if (!confirm('Este cliente não possui remadas disponíveis. Deseja forçar o agendamento?')) return;
                            }
                        } else if (!isGuardaria) {
                            assData.creditos = parseInt(assData.creditos) - 1;
                        }
                    }
                }
                
                if (!Array.isArray(State.db.agendamentos)) State.db.agendamentos = [];
                
                const dIso = State.agendamentoDate || new Date().toISOString().split('T')[0];

                if (tipo === 'assinante') {
                    State.db.agendamentos.push({
                        id: Date.now(),
                        assinante_id: assinanteId,
                        nome_cliente: nomeCliente,
                        horario_reserva: entrada,
                        saida: saida,
                        caiaque_id: caiaque,
                        data_reserva: dIso,

                        manual: true
                    });

                        cliente: nomeCliente,
                        horario_reserva: entrada,
                        saida: saida,
                        caiaque_id: caiaque,
                        data_reserva: dIso,
                        pagamento: 'Pendente',
                        data: dIso.split('-').reverse().join('/'),
                        status: 'confirmado',
                        manual: true
                    });

                Actions.audit(`Agendamento manual criado para ${nomeCliente}.`);

                if (!State.db.config) State.db.config = { precoBase: 60, precoInstrutor: 70 };
                if (Number.isFinite(base) && base > 0) State.db.config.precoBase = base;
                if (Number.isFinite(inst) && inst > 0) State.db.config.precoInstrutor = inst;
                Actions.audit(`Preços atualizados: base R$ ${State.db.config.precoBase}, instrutor R$ ${State.db.config.precoInstrutor}.`);
                Actions.persistDb();
            },
            clearAppStorageAndReload: async () => {
                const existingM = document.getElementById('modal-confirm-clear-cache');
                if (existingM) existingM.remove();
                
                try { Actions.audit('Cache do app limpo (storage reset completo).'); } catch(e) {}
                
                localStorage.removeItem(DB_STORAGE_KEY);
                localStorage.removeItem(DB_VERSION_KEY);
                localStorage.removeItem('plorix_user_session');
                localStorage.removeItem('plorix_last_route');
                localStorage.removeItem(THEME_STORAGE_KEY);
                localStorage.removeItem(SYNC_CONFIG_KEY);
                sessionStorage.removeItem('plorix_push_cleared_fotos');
                
                try {
                    if ('caches' in window) {
                        const keys = await caches.keys();
                        await Promise.all(keys.map(k => caches.delete(k)));
                    }
                    if ('serviceWorker' in navigator) {
                        const regs = await navigator.serviceWorker.getRegistrations();
                        await Promise.all(regs.map(r => r.unregister()));
                    }
                } catch(e) { console.error('Erro ao limpar caches/sw:', e); }
                
                window.location.href = window.location.origin + window.location.pathname;
            },
            clearAppStorage: () => {
                const existingM = document.getElementById('modal-confirm-clear-cache');
                if (existingM) existingM.remove();
                const m = document.createElement('div');

                        <p class="text-sm font-bold text-slate-600 dark:text-slate-300 mb-2">Isso apaga todos os dados deste dispositivo e reinicia o app.</p>
                        <p class="text-[10px] font-black text-amber-600 dark:text-amber-400 uppercase tracking-wider bg-amber-50 dark:bg-amber-900/30 rounded-xl p-3 mb-5">⚠️ Os dados na nuvem (Supabase) permanecem intactos. Apenas o cache local será removido.</p>
                        <div class="flex gap-3">
                            <button type="button" onclick="document.getElementById('modal-confirm-clear-cache').remove()" class="flex-1 py-3 bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 rounded-xl text-[10px] font-black uppercase border border-slate-200 dark:border-slate-600 active:scale-95">Cancelar</button>
                            <button type="button" onclick="Actions.clearAppStorageAndReload()" class="flex-1 py-3 bg-red-600 text-white rounded-xl text-[10px] font-black uppercase border border-red-400 active:scale-95">Limpar</button>
                        </div>
                    </div>`;
                document.body.appendChild(m);
            },

                State.selectedDate = newDate;

            },

            toggleBloqueio: (isoDate) => {
                if (!State.db.diasFechados) State.db.diasFechados = [];
                if (State.db.diasFechados.includes(isoDate)) {
                    State.db.diasFechados = State.db.diasFechados.filter(d => d !== isoDate);
                } else {
                    State.db.diasFechados.push(isoDate);
                }
                Actions.persistDb();
                Router.handleRoute();
            },

            changeCaixaDate: (offset) => {
                if (!State.caixaDate) State.caixaDate = new Date();
                const today = new Date();
                today.setHours(0, 0, 0, 0);
                const newDate = new Date(State.caixaDate);
                newDate.setDate(newDate.getDate() + offset);
                newDate.setHours(0, 0, 0, 0);
                if (newDate > today) return;
                State.caixaDate = newDate;
                State.caixaSearchQuery = '';
                Router.handleRoute();
            },

            fecharCaixa: () => {
                const todayStr = new Date().toLocaleDateString('pt-BR');
                const dateStr = (State.caixaDate || new Date()).toLocaleDateString('pt-BR');
                if (dateStr !== todayStr) {
                    alert('Só é possível fechar o caixa do dia atual.');
                    return;
                }
                if (State.db.fechamentos.some(f => f.data === dateStr)) {
                    alert('Fechamento do caixa já foi feito');
                    return;
                }
                const historicoData = State.db.history.filter(h => h.data === dateStr);
                const detalhes = { Pix: 0, Débito: 0, Dinheiro: 0, Crédito: 0, Cartão: 0 };
                let total = 0;
                historicoData.forEach(h => {
                    total += h.valor;
                    if (detalhes[h.pagamento] !== undefined) detalhes[h.pagamento] += h.valor;
                    else detalhes.Cartão += h.valor;
                });
                State.db.fechamentos.push({
                    data: dateStr,
                    total,
                    visitantes: historicoData.length,
                    detalhes,
                    fechadoPor: State.currentUser ? State.currentUser.name : 'Equipe',
                    fechadoEm: new Date().toISOString()
                });
                Actions.persistDb();
                alert('Caixa fechado e enviado com sucesso!');
                Router.handleRoute();
            },

            downloadFoto: (id) => {
                const foto = State.db.fotos.find(f => f.id === id);
                if (!foto) {
                    alert('Foto não encontrada.');
                    return;
                }
                const link = document.createElement('a');
                let href = foto.img;
                if (href && href.startsWith('http')) {
                    // Adiciona o parâmetro de download forçado do Cloudinary
                    href = href.replace('/upload/', '/upload/fl_attachment/');
                }
                link.href = href;
                link.download = `plorix-${foto.tipo}-${foto.id}.jpg`;
                document.body.appendChild(link);
                link.click();
                link.remove();
            },

                            <div class="mt-6 bg-emerald-50 dark:bg-emerald-900/30 text-emerald-600 dark:text-emerald-400 p-5 rounded-3xl text-center font-black uppercase tracking-wider text-[11px] border-2 border-emerald-200 dark:border-emerald-800 shadow-sm">
                                <div class="flex items-center justify-center gap-2 mb-2"><span class="text-2xl">✅</span> Caixa Fechado e Enviado</div>
                                ${fechamentoInfo && fechamentoInfo.fechadoPor ? `<p class="text-[9px] font-bold normal-case tracking-normal text-emerald-700 dark:text-emerald-300">Por ${fechamentoInfo.fechadoPor}${fechamentoInfo.fechadoEm ? ' · ' + new Date(fechamentoInfo.fechadoEm).toLocaleString('pt-BR') : ''}</p>` : ''}
                            </div>
                            <div class="mt-4">
                                <button type="button" onclick="Actions.exportPdfFechamento()" class="w-full py-4 bg-slate-700 text-white rounded-2xl text-[11px] font-black uppercase tracking-wider border border-slate-600 active:scale-95 shadow-md flex items-center justify-center gap-2">📄 Baixar Relatório em PDF</button>
                            </div>
                        ` : !isToday ? `
                            <div class="mt-4">
                                <button type="button" onclick="Actions.exportPdfFechamento()" class="w-full py-4 bg-slate-700 text-white rounded-2xl text-[11px] font-black uppercase tracking-wider border border-slate-600 active:scale-95 shadow-md flex items-center justify-center gap-2">📄 Baixar Relatório em PDF</button>
                            </div>
                        ` : `
                            <div class="mt-4">
                                <button onclick="Actions.fecharCaixa()" class="w-full bg-gradient-to-br from-slate-800 to-slate-950 text-white p-5 rounded-3xl shadow-float hover:-translate-y-1 active:scale-95 transition-all group flex flex-col items-center justify-center gap-2 border-2 border-slate-700">
                                    <span class="text-4xl leading-none group-hover:rotate-12 transition-transform drop-shadow-lg">🔒</span>
                                    <span class="text-[11px] font-black text-blue-300 uppercase tracking-wider text-center drop-shadow-sm mt-1">Fechar Caixa</span>
                                </button>
                            </div>
                        `}
                    </div>`;
                }
            }
        };

        Actions.activateSOS = () => {
            const me = State.currentUser?.name || 'Equipe';
            State.db.sos = { ativo: true, por: me, hora: new Date().toISOString() };
            Actions.audit(`SOS acionado por ${me}.`);
            Actions.persistDb();
            Actions.playAlertSound();
            alert('Aviso de auxílio enviado para a Recepção.');
            Router.handleRoute();
            // Auto-desativa após 5 minutos
            setTimeout(() => {
                if (State.db.sos && State.db.sos.ativo) {
                    State.db.sos.ativo = false;
                    Actions.persistDb();
                    Router.handleRoute();
                }
            }, 5 * 60 * 1000);
        };
        
        Actions.deactivateSOS = () => {
            State.db.sos.ativo = false;
            Actions.persistDb();
            Router.handleRoute();
        };
        
        Components.SOSBanner = () => {
            if (State.role !== 'recepcao') return '';
            const s = State.db?.sos;
            if (!s || !s.ativo) return '';
            const horaMs = s.hora ? new Date(s.hora).getTime() : 0;
            if (Date.now() - horaMs > 5 * 60 * 1000) return '';
            return `
            <div style="position: fixed; top: calc(env(safe-area-inset-top, 0px) + 0.75rem); left: 50%; transform: translateX(-50%); width: min(92vw, 24rem); z-index: 9999;" class="bg-red-600 text-white rounded-2xl border-4 border-red-300 shadow-2xl animate-pulse p-4 text-center">
                <div class="flex justify-between items-start mb-2">
                    <span class="text-3xl leading-none">🆘</span>
                    <button type="button" onclick="Actions.deactivateSOS()" class="px-3 py-1 bg-white/25 hover:bg-white/40 text-white rounded-lg text-[10px] font-black uppercase border border-white/40 active:scale-95">Dispensar</button>
                </div>
                <p class="text-sm font-black uppercase tracking-wider mb-1">🚨 Pedido de Auxílio</p>
                <p class="text-[11px] font-bold uppercase tracking-wider opacity-95">Instrutor ${s.por || '—'} está pedindo auxílio na água</p>
            </div>`;
        };

        function hidePlorixSplash() {
            const splash = document.getElementById('plorix-splash');
            if (!splash || splash.classList.contains('is-hidden')) return;
            splash.classList.add('is-hidden');
            setTimeout(() => splash.remove(), 450);
        }

        window.addEventListener('DOMContentLoaded', async () => {
            // 4. RESTAURAR SESSÃO AO RECARREGAR
            const saved = localStorage.getItem('plorix_user_session');
            if (saved) {
                try { State.currentUser = JSON.parse(saved); } catch(e) { localStorage.removeItem('plorix_user_session'); }
            }

            requestAnimationFrame(() => {
                setTimeout(hidePlorixSplash, 120);
            });
            
            // Registra o Service Worker cedo para não depender da nuvem
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('plorix-sw.js').catch(() => {});
            }

            // Inicia o app local IMEDIATAMENTE (non-blocking)
            Router.init();

            // Sincronização em segundo plano
            if (Sync.isEnabled()) {
                Actions.ensureCloudReady({ silent: true }).then(() => {
                    if (sessionStorage.getItem('plorix_push_cleared_fotos')) {
                        Sync.push().then(() => sessionStorage.removeItem('plorix_push_cleared_fotos'));
                    }
                    Actions.syncLockerStatus();
                    Actions.persistDb();
                    if (State.currentUser && State.role) Router.handleRoute(); // atualiza a view com dados da nuvem
                }).catch(e => console.error("Erro na sinc inicial:", e));
            } else {
                Actions.syncLockerStatus();
                Actions.persistDb();
            }

            Actions.fetchWeather(false);
            window.addEventListener('beforeinstallprompt', (e) => {
                e.preventDefault();
                State.deferredInstallPrompt = e;
                if (State.currentUser && State.role) Router.handleRoute();
            });
            window.addEventListener('online', () => {
                if (State.currentUser) Actions.ensureCloudReady({ silent: true });
                else if (Sync.isEnabled()) Actions.ensureCloudReady({ silent: true });
            });
            window.addEventListener('offline', () => Actions.setCloudStatus('offline'));
            document.addEventListener('visibilitychange', () => {
                if (document.visibilityState === 'visible') {
                    if (State.currentUser && Sync.isEnabled()) {
                        Actions.setupAppAutoSync();
                        Actions.syncPullIfReady(null, true);
                    }
                } else {
                    Actions.clearAppAutoSync();
                }
            });
        });

    </script>
</body>
</html>
